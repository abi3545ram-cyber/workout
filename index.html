const parseRestSec = rest => {
  if(!rest) return 90;
  const m = rest.match(/(\d+(?:\.\d+)?)\s*(?:[-]\d+)?\s*min/);
  if(m) return Math.round(parseFloat(m[1])*60);
  const s = rest.match(/(\d+)\s*s/);
  if(s) return parseInt(s[1]);
  return 90;
};
const fmt = s => {if(s<=0)return"0:00";return`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;};

];

const SPHASE = {
  1:{name:"Foundation",color:"#06b6d4",months:"Months 1-3",
     desc:"Static holds only. 3x per week minimum. Learn your body cues. Hip flexors are your priority area."},
  2:{name:"PNF Introduction",color:"#8b5cf6",months:"Months 4-6",
     desc:"Add contract-relax PNF to key stretches. Contract for 5s, exhale and relax deeper. 3 cycles per stretch."},
  3:{name:"Active Flexibility",color:"#f59e0b",months:"Months 7-9",
     desc:"Hold stretch positions without passive support. Build strength at end-range - critical for gymnastics and handstands."},
  4:{name:"Integration",color:"#ec4899",months:"Months 10-12",
     desc:"Flow between positions. Combine techniques. Explore advanced variations. Express the mobility you have built."},
  5:{name:"Mastery + Maintenance",color:"#22c55e",months:"Ongoing",
     desc:"3-4x per week maintenance. The goal now is to use the range in handstands, overhead pressing, and combat movement."},
};

// ── WEIGHT CHIP ────────────────────────────────────────────────────────────────
function WeightChip({exKey,defaultWeight,color,weights,onSave}) {
  const [editing,setEditing]=useState(false);
  const inputRef=useRef(null);
  const stored=weights[exKey];
  const current=stored!==undefined?stored:(defaultWeight||"");
  const [draft,setDraft]=useState(current);
  const startEdit=e=>{
    e.stopPropagation();setDraft(current);setEditing(true);
    setTimeout(()=>{if(inputRef.current){inputRef.current.focus();inputRef.current.select();}},30);
  };
  const commit=()=>{onSave(exKey,draft.trim());setEditing(false);};
  if(editing) return <input ref={inputRef} value={draft} onChange={e=>setDraft(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEditing(false);}} placeholder="e.g. 30kg" style={{background:"#1e1e1e",border:`1.5px solid ${color}`,borderRadius:"7px",color:"#fff",fontSize:"12px",fontWeight:"600",padding:"4px 9px",outline:"none",width:"110px"}}/>;
  return <div onClick={startEdit} style={{display:"inline-flex",alignItems:"center",gap:"5px",fontSize:"12px",fontWeight:"600",color:current?color:"#3a3a3a",background:"#161616",border:`1px solid ${current?color+"35":"#222"}`,padding:"4px 9px",borderRadius:"7px",cursor:"pointer",userSelect:"none"}}>{current?<><span>{current}</span><span style={{fontSize:"9px",color:"#555"}}>✏</span></>:<span>+ weight</span>}</div>;
}

// ── SESSION MODE ───────────────────────────────────────────────────────────────
function Session({exercises,color,weights,onSave,onExit}) {
  const [exIdx,setExIdx]=useState(0);
  const [setNum,setSetNum]=useState(1);
  const [state,setState]=useState("working"); // working | resting | done
  const [restSec,setRestSec]=useState(0);
  const restTotal=useRef(0);
  const timer=useRef(null);
  
  const ex=exercises[exIdx];
  const totalSets=ex?ex.sets:1;
  const doneSets=exercises.slice(0,exIdx).reduce((a,e)=>a+e.sets,0)+setNum-1;
  const allSets=exercises.reduce((a,e)=>a+e.sets,0);
  
  const clear=()=>{if(timer.current){clearInterval(timer.current);timer.current=null;}};
  
  const advance=()=>{
    clear();setRestSec(0);
    const lastSet=setNum>=totalSets;
    const lastEx=exIdx>=exercises.length-1;
    if(lastSet&&lastEx){setState("done");return;}
    if(lastSet){setExIdx(i=>i+1);setSetNum(1);}
    else setSetNum(s=>s+1);
    setState("working");
  };
  
  const doneSet=()=>{
    clear();
    const lastSet=setNum>=totalSets;
    const lastEx=exIdx>=exercises.length-1;
    if(lastSet&&lastEx){setState("done");return;}
    const secs=parseRestSec(ex.rest);
    restTotal.current=secs;setRestSec(secs);setState("resting");
    timer.current=setInterval(()=>{
      setRestSec(s=>{
        if(s<=1){clear();advance();return 0;}
        return s-1;
      });
    },1000);
  };
  
  const goTo=(i)=>{clear();setExIdx(Math.max(0,Math.min(i,exercises.length-1)));setSetNum(1);setState("working");setRestSec(0);};
  useEffect(()=>()=>clear(),[]);
  
  if(state==="done") return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 24px",textAlign:"center",height:"calc(100vh - 72px)"}}>
      <div style={{fontSize:"52px",marginBottom:"16px"}}>🎉</div>
      <div style={{fontSize:"22px",fontWeight:"700",marginBottom:"8px"}}>Session Complete</div>
      <div style={{fontSize:"14px",color:"#666",marginBottom:"32px"}}>{allSets} sets done</div>
      <button onClick={onExit} style={{padding:"14px 36px",borderRadius:"14px",background:color,color:"#000",fontSize:"16px",fontWeight:"800",cursor:"pointer",border:"none"}}>Done</button>
    </div>
  );
  
  const R=40,C=2*Math.PI*R;
  const rProg=restTotal.current>0?(restTotal.current-restSec)/restTotal.current:0;
  
  return (
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 72px)"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",borderBottom:"1px solid #1a1a1a",flexShrink:0}}>
        <button onClick={onExit} style={{background:"none",color:"#555",fontSize:"13px",fontWeight:"600",cursor:"pointer",padding:"6px 0",border:"none"}}>← List</button>
        <div style={{fontSize:"12px",color:"#666",textAlign:"center"}}>
          <div style={{fontWeight:"700"}}>{doneSets}/{allSets} sets</div>
          <div style={{color:"#444",fontSize:"11px"}}>exercise {exIdx+1}/{exercises.length}</div>
        </div>
        <div style={{display:"flex",gap:"6px"}}>
          <button onClick={()=>goTo(exIdx-1)} disabled={exIdx===0} style={{background:"#1a1a1a",color:exIdx===0?"#2a2a2a":"#777",padding:"6px 12px",borderRadius:"8px",fontSize:"13px",fontWeight:"700",cursor:exIdx===0?"default":"pointer",border:"none"}}>←</button>
          <button onClick={()=>goTo(exIdx+1)} disabled={exIdx===exercises.length-1} style={{background:"#1a1a1a",color:exIdx===exercises.length-1?"#2a2a2a":"#777",padding:"6px 12px",borderRadius:"8px",fontSize:"13px",fontWeight:"700",cursor:exIdx===exercises.length-1?"default":"pointer",border:"none"}}>→</button>
        </div>
      </div>
      
      <div style={{flex:1,overflowY:"auto",padding:"20px 20px 0"}}>
        {ex.section&&<div style={{fontSize:"10px",fontWeight:"800",color:"#3a3a3a",letterSpacing:"0.12em",marginBottom:"6px"}}>{ex.section}</div>}
        <div style={{fontSize:"24px",fontWeight:"700",lineHeight:"1.2",marginBottom:"6px",color:ex.hero?color:"#fff"}}>{ex.name}</div>
        <div style={{fontSize:"13px",color:"#555",marginBottom:"16px"}}>{ex.equip}</div>
        
        {/* Set progress bars */}
        <div style={{display:"flex",gap:"6px",marginBottom:"16px"}}>
          {Array.from({length:totalSets},(_,i)=>(
            <div key={i} style={{flex:1,height:"5px",borderRadius:"3px",transition:"background 0.3s",
              background:i<setNum-1?color:i===setNum-1?state==="resting"?color+"66":color:"#222"}}/>
          ))}
        </div>
        
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
          <div style={{fontSize:"22px",fontWeight:"700",color:color}}>SET {setNum}<span style={{fontSize:"14px",color:"#555"}}> / {totalSets}</span></div>
          <WeightChip exKey={ex.name} defaultWeight={ex.defaultWeight} color={color} weights={weights} onSave={onSave}/>
        </div>
        
        {ex.reps&&<div style={{display:"inline-flex",alignItems:"center",background:"#1a1a1a",padding:"8px 14px",borderRadius:"10px",fontSize:"14px",color:"#ddd",fontWeight:"600",marginBottom:"14px"}}>{ex.reps}</div>}
        
        <div style={{fontSize:"13px",color:"#888",lineHeight:"1.6",marginBottom:"16px"}}>{ex.cue}</div>
      </div>
      
      {/* Bottom */}
      <div style={{padding:"14px 20px 30px",borderTop:"1px solid #1a1a1a",flexShrink:0}}>
        {state==="working"&&(
          <button onClick={doneSet} style={{width:"100%",padding:"18px",borderRadius:"16px",background:color,color:"#000",fontSize:"18px",fontWeight:"800",cursor:"pointer",border:"none"}}>
            ✓ Done Set {setNum}
          </button>
        )}
        {state==="resting"&&(
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:"12px",color:"#555",marginBottom:"10px",fontWeight:"600",letterSpacing:"0.08em"}}>REST</div>
            <div style={{display:"flex",justifyContent:"center",marginBottom:"10px"}}>
              <svg width="96" height="96" viewBox="0 0 96 96">
                <circle cx="48" cy="48" r={R} fill="none" stroke="#1e1e1e" strokeWidth="7"/>
                <circle cx="48" cy="48" r={R} fill="none" stroke={color} strokeWidth="7"
                  strokeDasharray={C} strokeDashoffset={C*(1-rProg)} strokeLinecap="round"
                  transform="rotate(-90 48 48)" style={{transition:"stroke-dashoffset 0.9s linear"}}/>
                <text x="48" y="55" textAnchor="middle" style={{fontSize:"20px",fontWeight:"700",fill:"#fff"}}>{fmt(restSec)}</text>
              </svg>
            </div>
            <button onClick={()=>{clear();advance();}} style={{width:"100%",padding:"15px",borderRadius:"14px",background:"#1a1a1a",color:"#777",fontSize:"15px",fontWeight:"700",cursor:"pointer",border:"1px solid #2a2a2a"}}>
              Skip Rest →
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── STRETCH TIMER ──────────────────────────────────────────────────────────────
function StretchTimer({phase,onExit}) {
  const meta=SPHASE[phase];
  const [idx,setIdx]=useState(0);
  const [sec,setSec]=useState(0);
  const [sideIdx,setSideIdx]=useState(0);
  const [running,setRunning]=useState(false);
  const [finished,setFinished]=useState(false);
  const timer=useRef(null);
  
  const S=STRETCHES;
  const ns=s=>s.sideLabels.length||1;
  const sps=s=>Math.round(s.totalSec/ns(s));
  const cumStarts=[];let cum=0;S.forEach(s=>{cumStarts.push(cum);cum+=s.totalSec;});
  const totalSec=cum;
  
  const clear=()=>{if(timer.current){clearInterval(timer.current);timer.current=null;}};
  
  useEffect(()=>{
    if(!running)return;
    timer.current=setInterval(()=>{
      setSec(prev=>{
        const s=S[idx];
        const ns2=prev+1;
        const sp=sps(s);
        const newSide=Math.min(Math.floor(ns2/sp),ns(s)-1);
        if(newSide!==sideIdx)setSideIdx(newSide);
        if(ns2>=s.totalSec){
          clear();setRunning(false);
          if(idx<S.length-1){
            setTimeout(()=>{setIdx(i=>i+1);setSec(0);setSideIdx(0);setRunning(true);},700);
          } else {
            setFinished(true);
          }
          return s.totalSec;
        }
        return ns2;
      });
    },1000);
    return clear;
  },[running,idx,sideIdx]);
  
  useEffect(()=>()=>clear(),[]);
  
  const next=()=>{clear();setRunning(false);if(idx<S.length-1){setIdx(i=>i+1);setSec(0);setSideIdx(0);}};
  const prev=()=>{clear();setRunning(false);if(idx>0){setIdx(i=>i-1);setSec(0);setSideIdx(0);}};
  const toggle=()=>{if(running){clear();setRunning(false);}else setRunning(true);};
  const reset=()=>{clear();setRunning(false);setIdx(0);setSec(0);setSideIdx(0);setFinished(false);};
  
  if(finished) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 24px",textAlign:"center",height:"calc(100vh - 72px)"}}>
      <div style={{fontSize:"52px",marginBottom:"16px"}}>✨</div>
      <div style={{fontSize:"22px",fontWeight:"700",marginBottom:"8px"}}>Stretch Complete</div>
      <div style={{fontSize:"14px",color:"#666",marginBottom:"32px"}}>20 min · 13 stretches done</div>
      <div style={{display:"flex",gap:"12px"}}>
        <button onClick={reset} style={{padding:"14px 24px",borderRadius:"14px",background:"#1a1a1a",color:"#888",fontSize:"14px",fontWeight:"700",cursor:"pointer",border:"none"}}>Again</button>
        <button onClick={onExit} style={{padding:"14px 24px",borderRadius:"14px",background:meta.color,color:"#000",fontSize:"14px",fontWeight:"800",cursor:"pointer",border:"none"}}>Done</button>
      </div>
    </div>
  );
  
  const stretch=S[idx];
  const sp=sps(stretch);
  const sideElapsed=sec-sideIdx*sp;
  const frac=Math.min(sideElapsed/sp,1);
  const R=38,Circ=2*Math.PI*R;
  const elapsed=cumStarts[idx]+sec;
  const totalPct=Math.min(Math.round(elapsed/totalSec*100),100);
  const em=Math.floor(elapsed/60),es=elapsed%60;
  const how=stretch.phases[phase]?.how||stretch.phases[1].how;
  const dur=stretch.phases[phase]?.dur||"";
  
  return (
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 72px)"}}>
      {/* Progress dots */}
      <div style={{padding:"10px 16px 0",display:"flex",alignItems:"center",gap:"6px",flexShrink:0}}>
        <div style={{display:"flex",gap:"4px",flex:1,flexWrap:"wrap"}}>
          {S.map((_,i)=>(
            <div key={i} style={{width:"8px",height:"8px",borderRadius:"50%",background:i<idx?meta.color:i===idx?"#fff":"#222",transition:"background 0.3s"}}/>
          ))}
        </div>
        <span style={{fontSize:"11px",color:"#555",whiteSpace:"nowrap",marginLeft:"6px"}}>{idx+1}/13</span>
        <button onClick={onExit} style={{background:"none",color:"#444",fontSize:"13px",cursor:"pointer",padding:"0 0 0 10px",border:"none",fontWeight:"600"}}>Exit</button>
      </div>
      
      {/* Main card */}
      <div style={{flex:1,padding:"14px 16px",overflowY:"auto"}}>
        <div style={{background:"#111",border:"1px solid #1d1d1d",borderRadius:"16px",padding:"16px",marginBottom:"10px"}}>
          <div style={{display:"flex",gap:"14px"}}>
            {/* Ring */}
            <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:"8px"}}>
              <svg width="88" height="88" viewBox="0 0 88 88">
                <circle cx="44" cy="44" r={R} fill="none" stroke="#1e1e1e" strokeWidth="6"/>
                <circle cx="44" cy="44" r={R} fill="none" stroke={meta.color} strokeWidth="6"
                  strokeDasharray={Circ} strokeDashoffset={frac*Circ} strokeLinecap="round"
                  transform="rotate(-90 44 44)" style={{transition:"stroke-dashoffset 0.95s linear"}}/>
                <text x="44" y="51" textAnchor="middle" style={{fontSize:"16px",fontWeight:"700",fill:"#fff"}}>{Math.max(stretch.totalSec-sec,0)}s</text>
              </svg>
              <span style={{fontSize:"11px",color:"#555",fontStyle:"italic",textAlign:"center",maxWidth:"88px",minHeight:"14px"}}>
                {stretch.sideLabels.length>0?stretch.sideLabels[Math.min(sideIdx,stretch.sideLabels.length-1)]:running?"hold":sec>0?"paused":"ready"}
              </span>
            </div>
            {/* Info */}
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",gap:"4px",marginBottom:"5px",flexWrap:"wrap"}}>
                {stretch.priority&&<span style={{fontSize:"10px",fontWeight:"700",background:meta.color+"30",color:meta.color,padding:"2px 7px",borderRadius:"8px"}}>Priority</span>}
                {stretch.isNew&&<span style={{fontSize:"10px",fontWeight:"700",background:"#22c55e20",color:"#22c55e",padding:"2px 7px",borderRadius:"8px"}}>New</span>}
                {stretch.isDynamic&&<span style={{fontSize:"10px",fontWeight:"700",background:"#3b82f620",color:"#3b82f6",padding:"2px 7px",borderRadius:"8px"}}>Dynamic</span>}
              </div>
              <div style={{fontSize:"17px",fontWeight:"700",marginBottom:"4px",lineHeight:"1.2"}}>{stretch.name}</div>
              <div style={{fontSize:"11px",color:meta.color,marginBottom:"6px",fontWeight:"600"}}>{dur}</div>
              <div style={{fontSize:"11px",color:"#404040",marginBottom:"8px"}}>{stretch.muscles.join(" · ")}</div>
            </div>
          </div>
          <div style={{fontSize:"13px",color:"#999",lineHeight:"1.65",marginTop:"10px",paddingTop:"10px",borderTop:"1px solid #1a1a1a"}}>{how}</div>
        </div>
      </div>
      
      {/* Controls */}
      <div style={{padding:"10px 16px 26px",borderTop:"1px solid #1a1a1a",flexShrink:0}}>
        <div style={{display:"flex",gap:"8px",marginBottom:"10px"}}>
          <button onClick={prev} style={{padding:"12px 14px",borderRadius:"12px",background:"#1a1a1a",color:"#666",fontSize:"14px",fontWeight:"700",cursor:"pointer",border:"none"}}>← Back</button>
          <button onClick={toggle} style={{flex:1,padding:"12px",borderRadius:"12px",background:meta.color,color:"#000",fontSize:"15px",fontWeight:"800",cursor:"pointer",border:"none"}}>
            {running?"Pause":sec===0?"Start Timer":"Resume"}
          </button>
          <button onClick={next} style={{padding:"12px 14px",borderRadius:"12px",background:"#1a1a1a",color:"#666",fontSize:"14px",fontWeight:"700",cursor:"pointer",border:"none"}}>Skip →</button>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
          <div style={{flex:1,height:"3px",background:"#1a1a1a",borderRadius:"2px"}}>
            <div style={{height:"100%",borderRadius:"2px",background:meta.color,width:`${totalPct}%`,transition:"width 0.4s"}}/>
          </div>
          <span style={{fontSize:"11px",color:"#444",whiteSpace:"nowrap"}}>{em}:{String(es).padStart(2,"0")} / 20:00</span>
        </div>
      </div>
    </div>
  );
}

// ── TENDON VIEW ─────────────────────────────────────────────────────────────────
function TendonView({weights,onSave}) {
  const [phase,setPhase]=useState("p1");
  const [session,setSession]=useState("A");
  const [mode,setMode]=useState("list");
  const pd=TENDON[phase];
  const color=pd.color;
  const sd=pd.sessions.find(s=>s.label===`SESSION ${session}`);
  const exercises=sd.exercises;
  let idx=0;
  
  if(mode==="session") return <Session exercises={exercises} color={color} weights={weights} onSave={onSave} onExit={()=>setMode("list")}/>;
  
  return (
    <div>
      <div style={{padding:"12px 12px 8px"}}>
        {/* Phase picker */}
        <div style={{display:"flex",gap:"6px",marginBottom:"8px"}}>
          {["p1","p2","p3"].map(p=>{
            const d=TENDON[p],a=phase===p;
            return <button key={p} onClick={()=>{setPhase(p);setMode("list");}} style={{flex:1,padding:"8px 4px",borderRadius:"10px",border:a?`1.5px solid ${d.color}`:"1.5px solid #1e1e1e",background:a?d.color+"18":"transparent",color:a?d.color:"#444",fontSize:"11px",fontWeight:"800",cursor:"pointer",transition:"all 0.12s"}}>{d.label}<br/><span style={{fontSize:"9px",fontWeight:"600",opacity:0.7}}>{d.name}</span></button>;
          })}
        </div>
        {/* Session picker */}
        <div style={{display:"flex",gap:"6px",marginBottom:"10px"}}>
          {["A","B"].map(s=>(
            <button key={s} onClick={()=>setSession(s)} style={{flex:1,padding:"9px",borderRadius:"10px",border:session===s?`1.5px solid ${color}`:"1.5px solid #1e1e1e",background:session===s?color+"18":"transparent",color:session===s?color:"#444",fontSize:"13px",fontWeight:"700",cursor:"pointer",transition:"all 0.12s"}}>
              Session {s}<br/><span style={{fontSize:"10px",fontWeight:"500",opacity:0.7}}>{TENDON[phase].sessions.find(x=>x.label===`SESSION ${s}`)?.day}</span>
            </button>
          ))}
        </div>
        {/* Meta */}
        <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:"10px",padding:"10px 12px",marginBottom:"8px"}}>
          <div style={{fontSize:"12px",fontWeight:"700",color,marginBottom:"3px"}}>{pd.name} · {pd.weeks}</div>
          <div style={{fontSize:"12px",color:"#888",lineHeight:"1.5"}}>{pd.meta}</div>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end"}}>
          <button onClick={()=>setMode("session")} style={{padding:"9px 20px",borderRadius:"10px",background:color,color:"#000",fontSize:"13px",fontWeight:"800",cursor:"pointer",border:"none"}}>Start ▶</button>
        </div>
      </div>
      <div style={{padding:"0 12px 80px"}}>
        {exercises.map(ex=><ExCard key={ex.name+phase+session} ex={ex} idx={idx++} color={color} weights={weights} onSave={onSave}/>)}
      </div>
    </div>
  );
}

// ── STRETCH VIEW ────────────────────────────────────────────────────────────────
function StretchView() {
  const [phase,setPhase]=useState(1);
  const [mode,setMode]=useState("list");
  const meta=SPHASE[phase];
  
  if(mode==="timer") return <StretchTimer phase={phase} onExit={()=>setMode("list")}/>;
  
  return (
    <div>
      <div style={{padding:"12px 12px 8px"}}>
        <div style={{display:"flex",gap:"5px",marginBottom:"10px"}}>
          {[1,2,3,4,5].map(p=>{
            const pm=SPHASE[p],a=phase===p;
            return <button key={p} onClick={()=>setPhase(p)} style={{flex:1,padding:"7px 2px",borderRadius:"9px",border:a?`1.5px solid ${pm.color}`:"1.5px solid #1e1e1e",background:a?pm.color+"18":"transparent",color:a?pm.color:"#444",fontSize:"11px",fontWeight:"800",cursor:"pointer",transition:"all 0.12s"}}>P{p}</button>;
          })}
        </div>
        <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:"10px",padding:"10px 12px",marginBottom:"8px"}}>
          <div style={{fontSize:"12px",fontWeight:"700",color:meta.color,marginBottom:"3px"}}>{meta.name} · {meta.months}</div>
          <div style={{fontSize:"12px",color:"#888",lineHeight:"1.5"}}>{meta.desc}</div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}}>
          <div style={{fontSize:"12px",color:"#555"}}>13 stretches · 20 min · tap card for cue</div>
          <button onClick={()=>setMode("timer")} style={{padding:"9px 18px",borderRadius:"10px",background:meta.color,color:"#000",fontSize:"13px",fontWeight:"800",cursor:"pointer",border:"none"}}>Start Timer ▶</button>
        </div>
      </div>
      <div style={{padding:"0 12px 80px"}}>
        {STRETCHES.map((stretch,i)=>{
          const [open,setOpen]=useState(false);
          const pd=stretch.phases[phase];
          return (
            <div key={stretch.name} style={{background:"#111",border:`1px solid ${stretch.priority?meta.color+"40":"#1d1d1d"}`,borderRadius:"13px",marginBottom:"7px",overflow:"hidden"}}>
              <div style={{display:"flex",alignItems:"center",gap:"10px",padding:"13px 13px 11px",cursor:"pointer"}} onClick={()=>setOpen(o=>!o)}>
                <div style={{width:"28px",height:"28px",borderRadius:"50%",flexShrink:0,border:`1.5px solid ${meta.color}50`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",fontWeight:"800",color:meta.color}}>{i+1}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:"14px",fontWeight:"600",color:"#efefef",display:"flex",alignItems:"center",gap:"5px",flexWrap:"wrap"}}>
                    {stretch.name}
                    {stretch.priority&&<span style={{fontSize:"9px",background:meta.color,color:"#000",padding:"2px 5px",borderRadius:"4px",fontWeight:"800"}}>PRIORITY</span>}
                    {stretch.isNew&&<span style={{fontSize:"9px",background:"#22c55e",color:"#000",padding:"2px 5px",borderRadius:"4px",fontWeight:"800"}}>NEW</span>}
                  </div>
                  <div style={{fontSize:"11px",color:"#404040",marginTop:"2px"}}>{stretch.muscles.join(" · ")}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:"11px",fontWeight:"700",color:meta.color}}>{pd?.dur}</div>
                  <div style={{fontSize:"10px",color:"#444",marginTop:"2px"}}>{stretch.isDynamic?"Dynamic":"Static"}</div>
                </div>
              </div>
              {open&&<div style={{padding:"0 13px 13px",fontSize:"13px",color:"#bbb",lineHeight:"1.65",borderTop:"1px solid #1a1a1a",paddingTop:"11px"}}>{pd?.how}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]=useState("fb");
  const [weights,setWeights]=useState({});
  useEffect(()=>{try{const s=localStorage.getItem("workout-weights");if(s)setWeights(JSON.parse(s));}catch(_){};},[]);
  const save=(key,val)=>{const u={...weights,[key]:val};setWeights(u);try{localStorage.setItem("workout-weights",JSON.stringify(u));}catch(_){}};
  const TABS=[{id:"fb",label:"Full Body",color:"#22c55e"},{id:"ten",label:"Tendon",color:"#ef4444"},{id:"str",label:"Stretch",color:"#06b6d4"}];
  const TT={fb:"Full Body",ten:"Tendon Strengthening",str:"Stretching"};
  const TS={fb:"0-2 RIR · 28 sets · ~75 min",ten:"12-week program · Phases 1-3",str:"13 stretches · 20 min · 5-phase plan"};
  return (
    <div style={{background:"#080808",minHeight:"100vh",color:"#fff",maxWidth:"430px",margin:"0 auto"}}>
      <div style={{position:"sticky",top:0,zIndex:20,background:"#080808",borderBottom:"1px solid #1a1a1a",padding:"14px 12px 12px"}}>
        <div style={{display:"flex",gap:"8px",marginBottom:"12px"}}>
          {TABS.map(t=>{const a=tab===t.id;return <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px",borderRadius:"12px",border:a?`1.5px solid ${t.color}`:"1.5px solid #1e1e1e",background:a?t.color+"18":"transparent",color:a?t.color:"#444",fontSize:"13px",fontWeight:"800",cursor:"pointer",transition:"all 0.12s"}}>{t.label}</button>;})}
        </div>
        <div style={{paddingLeft:"2px"}}>
          <div style={{fontSize:"19px",fontWeight:"700",lineHeight:"1.2"}}>{TT[tab]}</div>
          <div style={{fontSize:"12px",color:"#555",marginTop:"2px"}}>{TS[tab]}</div>
        </div>
      </div>
      {tab==="fb"&&<FBView weights={weights} onSave={save}/>}
      {tab==="ten"&&<TendonView weights={weights} onSave={save}/>}
      {tab==="str"&&<StretchView/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
