<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Workout">
  <meta name="theme-color" content="#121214">
  <title>Workout & Mobility Flow</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    :root[data-theme="dark"] {
      --bg:#121214;--card-bg:#1c1c1e;--card-border:rgba(255,255,255,0.07);--text:#fff;
      --text-secondary:#8e8e93;--accent:#bf5af2;--accent-muted:rgba(191,90,242,0.15);
      --accent-rgb:191,90,242;--success:#30d158;--success-muted:rgba(48,209,88,0.15);
      --warning:#ff9f0a;--warning-muted:rgba(255,159,10,0.15);--danger:#ff453a;
      --danger-muted:rgba(255,69,58,0.15);--header-bg:#1c1c1e;--btn-text:#fff;
      --input-bg:rgba(255,255,255,0.05);--shadow:0 8px 24px rgba(0,0,0,0.3);--border-thickness:1px;
    }
    :root[data-theme="light"] {
      --bg:#f5f5f7;--card-bg:#fff;--card-border:rgba(0,0,0,0.06);--text:#1c1c1e;
      --text-secondary:#8e8e93;--accent:#af52de;--accent-muted:rgba(175,82,222,0.1);
      --accent-rgb:175,82,222;--success:#34c759;--success-muted:rgba(52,199,89,0.1);
      --warning:#ff9500;--warning-muted:rgba(255,149,0,0.1);--danger:#ff3b30;
      --danger-muted:rgba(255,59,48,0.1);--header-bg:#fff;--btn-text:#fff;
      --input-bg:rgba(0,0,0,0.03);--shadow:0 8px 24px rgba(0,0,0,0.05);--border-thickness:1px;
    }
    :root[data-theme="anti-red"] {
      --bg:#000;--card-bg:#0c0c0c;--card-border:#ffd700;--text:#ffd700;
      --text-secondary:#e5c158;--accent:#ffd700;--accent-muted:rgba(255,215,0,0.15);
      --accent-rgb:255,215,0;--success:#ffd700;--success-muted:rgba(255,215,0,0.1);
      --warning:#ffd700;--warning-muted:rgba(255,215,0,0.1);--danger:#ffd700;
      --danger-muted:rgba(255,215,0,0.1);--header-bg:#0c0c0c;--btn-text:#000;
      --input-bg:rgba(255,215,0,0.05);--shadow:none;--border-thickness:1.5px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:var(--bg);color:var(--text);-webkit-text-size-adjust:100%;transition:background 0.25s,color 0.25s}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;padding-bottom:calc(85px + env(safe-area-inset-bottom))}
    ::-webkit-scrollbar{display:none}
    *{scrollbar-width:none}
    button{font-family:inherit;border:none;outline:none;background:none;cursor:pointer;color:inherit;transition:opacity 0.15s,transform 0.1s}
    button:active{opacity:0.7;transform:scale(0.98)}
    .container{max-width:480px;margin:0 auto;padding:20px}
    .card{background:var(--card-bg);border:var(--border-thickness) solid var(--card-border);border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:var(--shadow);transition:all 0.2s ease}
    .modal-bg{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.75);display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);animation:fadeIn 0.2s ease-out}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal-body{background:var(--card-bg);border-top:var(--border-thickness) solid var(--card-border);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding:12px 24px calc(40px + env(safe-area-inset-bottom));box-shadow:0 -8px 32px rgba(0,0,0,0.5);animation:slideUp 0.25s cubic-bezier(0.16,1,0.3,1)}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .drag-bar{width:40px;height:5px;background:var(--card-border);border-radius:3px;margin:4px auto 16px}
    .field{display:block;width:100%;background:var(--input-bg);border:var(--border-thickness) solid var(--card-border);border-radius:10px;color:var(--text);font-size:16px;padding:12px 14px;margin-bottom:12px;transition:border-color 0.15s}
    .field:focus{border-color:var(--accent)}
    .field-label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
    header{background:var(--header-bg);border-bottom:var(--border-thickness) solid var(--card-border);position:sticky;top:0;z-index:50;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
    .app-title{font-size:20px;font-weight:800;letter-spacing:-0.02em}
    .tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--header-bg);border-top:var(--border-thickness) solid var(--card-border);display:flex;justify-content:space-around;padding:10px 10px calc(12px + env(safe-area-inset-bottom));z-index:90;box-shadow:0 -4px 16px rgba(0,0,0,0.15)}
    .tab-btn{display:flex;flex-direction:column;align-items:center;font-size:10px;font-weight:600;color:var(--text-secondary);width:68px}
    .tab-btn.active{color:var(--accent)}
    .tab-btn svg{margin-bottom:4px}
    .badge{display:inline-flex;align-items:center;justify-content:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;margin-left:6px;background:var(--accent-muted);color:var(--accent);border:0.5px solid var(--accent)}
    .exercise-count-badge{font-size:10px;background:var(--input-bg);border:var(--border-thickness) solid var(--card-border);color:var(--text-secondary);border-radius:6px;padding:2px 6px;font-weight:600}
    .timer-overlay{position:fixed;inset:0;background:var(--bg);z-index:120;display:flex;flex-direction:column;padding:20px 20px calc(30px + env(safe-area-inset-bottom));animation:fadeIn 0.25s ease-out;overflow-y:auto}
    .timer-circle-container{position:relative;width:230px;height:230px;margin:40px auto;display:flex;align-items:center;justify-content:center}
    .timer-circle-svg{transform:rotate(-90deg);width:100%;height:100%}
    .timer-circle-bg{fill:none;stroke:var(--card-border);stroke-width:10}
    .timer-circle-progress{fill:none;stroke:var(--accent);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 0.1s linear}
    .timer-display{position:absolute;font-size:48px;font-weight:800;font-variant-numeric:tabular-nums;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .timer-label{font-size:12px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-secondary);margin-top:4px;font-weight:700}
    .button-primary{width:100%;padding:14px;border-radius:12px;background:var(--accent);color:var(--btn-text);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;border:var(--border-thickness) solid var(--accent)}
    .button-secondary{width:100%;padding:14px;border-radius:12px;background:var(--input-bg);border:var(--border-thickness) solid var(--card-border);color:var(--text);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px}
    .skip-btn-large{padding:16px 24px;border-radius:14px;background:var(--danger-muted);color:var(--text);border:1.5px solid var(--danger);font-size:15px;font-weight:800;letter-spacing:0.05em;text-transform:uppercase;min-width:130px}
    .restart-btn{width:52px;height:52px;border-radius:50%;background:var(--input-bg);border:var(--border-thickness) solid var(--card-border);display:flex;align-items:center;justify-content:center}
    .play-pause-btn{width:64px;height:64px;border-radius:50%;background:var(--accent);color:var(--btn-text);display:flex;align-items:center;justify-content:center}
    .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:14px}
    .calendar-header-day{text-align:center;font-size:11px;font-weight:700;color:var(--text-secondary);padding-bottom:4px}
    .calendar-day-box{aspect-ratio:1;border-radius:8px;border:var(--border-thickness) solid var(--card-border);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;font-weight:600;cursor:pointer;position:relative;transition:transform 0.1s}
    .calendar-day-box:active{transform:scale(0.9)}
    .calendar-day-box.empty{background:transparent;opacity:0.3}
    .calendar-day-box.today{border:2px solid var(--accent);font-weight:800}
    .calendar-day-box.completed{background:var(--success);color:var(--btn-text);border-color:var(--success)}
    .calendar-day-box.partial{background:var(--warning-muted);border:1.5px dashed var(--warning);color:var(--text)}
    .chart-container{position:relative;width:100%;height:180px;background:var(--input-bg);border:var(--border-thickness) solid var(--card-border);border-radius:12px;margin-top:10px;overflow:hidden;padding:8px}
    .chart-svg{width:100%;height:100%}
    .text-success{color:var(--success)!important}
    .text-warning{color:var(--warning)!important}
    .text-danger{color:var(--danger)!important}
    .text-accent{color:var(--accent)!important}
    .text-small{font-size:13px;color:var(--text-secondary)}
    .font-bold{font-weight:700}
    .flex-row{display:flex;align-items:center;gap:8px}
    .flex-between{display:flex;align-items:center;justify-content:space-between}
    .exercise-cue-box{background:var(--input-bg);border-left:3px solid var(--accent);padding:10px 14px;border-radius:0 8px 8px 0;font-size:13px;line-height:1.4;color:var(--text-secondary);margin:8px 0 14px}
    .badge-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
    .session-badge{background:var(--input-bg);border:var(--border-thickness) solid var(--card-border);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px}
    .progression-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--card-border);font-size:14px}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Utilities ──────────────────────────────────────────────────────────────
    const parseRestSec = r => {
      if (!r) return 90;
      const m = r.match(/(\d+(?:\.\d+)?)\s*min/);
      if (m) return Math.round(parseFloat(m[1]) * 60);
      const s = r.match(/(\d+)s/);
      if (s) return parseInt(s[1]);
      return 90;
    };
    const fmtTime = s => s <= 0 ? "0:00" : `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
    // FIX 1: fmtMin was called in StretchesTab but never defined
    const fmtMin = s => { const m = Math.floor(s/60); const rem = s%60; return rem > 0 ? `${m}m ${rem}s` : `${m} min`; };
    const uid = () => Math.random().toString(36).slice(2,9);
    const store = {
      get:(k,d)=>{try{const v=localStorage.getItem(k);if(!v)return d;const p=JSON.parse(v);if(Array.isArray(d)&&!Array.isArray(p))return d;if(d&&typeof d==='object'&&!Array.isArray(d)){if(typeof p!=='object'||p===null||Array.isArray(p))return d;return{...d,...p};}return p;}catch{return d;}},
      set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
    };

    // ── Audio ──────────────────────────────────────────────────────────────────
    const playSynthTone = (freqs, duration, type='sine', volume=0.1) => {
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        const ctx = new AC();
        freqs.forEach((freq, idx) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
          gain.gain.setValueAtTime(volume, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
          osc.start(ctx.currentTime + idx*0.1);
          osc.stop(ctx.currentTime + duration + idx*0.1);
        });
      } catch {}
    };
    const triggerSound = type => {
      if (type==='tick')        playSynthTone([440],0.05,'triangle',0.15);
      else if (type==='chime')  playSynthTone([523.25,659.25,783.99],0.6,'sine',0.2);
      else if (type==='rest-chime') playSynthTone([392,523.25],0.4,'sine',0.15);
      else if (type==='beep-high')  playSynthTone([880],0.12,'sine',0.2);
    };

    function SoundConfigCard() {
      return (
        <div className="card">
          <div className="flex-between" style={{marginBottom:"12px"}}>
            <div>
              <p className="font-bold">Sound Synthesizer</p>
              <p className="text-small">Built-in audio alerts — works offline</p>
            </div>
            <div style={{display:"flex",gap:"6px"}}>
              <button className="button-secondary" style={{padding:"6px 12px",fontSize:"12px",width:"auto"}} onClick={()=>triggerSound('tick')}>Tick</button>
              <button className="button-secondary" style={{padding:"6px 12px",fontSize:"12px",width:"auto"}} onClick={()=>triggerSound('rest-chime')}>Rest</button>
              <button className="button-secondary" style={{padding:"6px 12px",fontSize:"12px",width:"auto"}} onClick={()=>triggerSound('chime')}>Alarm</button>
            </div>
          </div>
        </div>
      );
    }

    function WakeLockToggle() {
      const [locked, setLocked] = useState(false);
      const wlRef = useRef(null);
      const requestLock = async () => {
        try {
          if ('wakeLock' in navigator) {
            wlRef.current = await navigator.wakeLock.request('screen');
            setLocked(true);
            wlRef.current.addEventListener('release', ()=>setLocked(false));
          }
        } catch {}
      };
      const releaseLock = async () => {
        if (wlRef.current) { await wlRef.current.release(); wlRef.current=null; setLocked(false); }
      };
      useEffect(()=>()=>{if(wlRef.current)wlRef.current.release();},[]);
      return (
        <div className="card">
          <div className="flex-between">
            <div>
              <p className="font-bold">Screen Wake Lock</p>
              <p className="text-small">Keep screen on during timers</p>
            </div>
            <button onClick={locked?releaseLock:requestLock} style={{background:locked?"var(--success-muted)":"var(--input-bg)",border:locked?"1.5px solid var(--success)":"var(--border-thickness) solid var(--card-border)",borderRadius:"20px",padding:"6px 16px",fontSize:"13px",fontWeight:"700",color:locked?"var(--success)":"var(--text)"}}>
              {locked?"Active":"Off"}
            </button>
          </div>
        </div>
      );
    }

    // ── Data ───────────────────────────────────────────────────────────────────
    const FB_SECTIONS = [
      {section:"Arms",exercises:[
        {name:"Overhead Triceps Extension",equip:"Cable",sets:2,reps:"8-12",weight:"",rest:"2 min",hero:true,
         cue:"Do this completely fresh. Both hands on rope, elbows above head. Lower behind head to full long-head stretch. Press to lockout. Max effort."},
        {name:"Tricep Pushdown",equip:"Cable Single",sets:1,reps:"10-12",weight:"",rest:"90s",
         cue:"Elbows pinned to sides. Full extension at bottom. Controlled return."},
        {name:"Bicep Curl",equip:"Cable Single",sets:1,reps:"10-12",weight:"",rest:"90s",
         cue:"Full extension at bottom — cable keeps tension here. Curl to peak, slow negative."},
        {name:"Reverse Preacher Curl",equip:"EZ Bar",sets:1,reps:"10-12",weight:"",rest:"75s",
         cue:"Full extension at bottom. Overhand grip. Hits brachialis and brachioradialis. Slow."},
      ]},
      {section:"Push",exercises:[
        {name:"Chest Press",equip:"Machine",sets:1,reps:"8-12",weight:"",rest:"2 min",
         cue:"One second pause at full stretch at the bottom. Drive to lockout. Don't bounce."},
        {name:"Shoulder Press",equip:"Machine",sets:1,reps:"8-12",weight:"",rest:"90s",
         cue:"Full overhead lockout every rep. Don't cut the range at the top."},
        {name:"One Arm Lateral Raise",equip:"Cable Single",sets:1,reps:"12-15",weight:"",rest:"75s",
         cue:"Cable from low position. Arm across body at start — bottom is max stretch. No swinging."},
        {name:"Front Raise",equip:"Dumbbell",sets:1,reps:"10-15",weight:"",rest:"60s",
         cue:"Control the eccentric. Raise to eye level. No momentum."},
      ]},
      {section:"Pull",exercises:[
        {name:"Lat Pulldown",equip:"Machine",sets:1,reps:"8-12",weight:"",rest:"2 min",
         cue:"Arms fully extended at top before every pull. Pull to upper chest, elbows drive down and back."},
        {name:"Back Row",equip:"Machine",sets:1,reps:"8-12",weight:"",rest:"2 min",
         cue:"Full arm extension before every rep. Drive elbows past your torso. Squeeze at peak."},
        {name:"Low Row",equip:"Cable Single",sets:1,reps:"10-12",weight:"",rest:"90s",
         cue:"Full stretch at start. Single arm — drive elbow back past hip."},
        {name:"Reverse Fly",equip:"Machine",sets:1,reps:"12-15",weight:"",rest:"75s",
         cue:"Full stretch at start. Keep shoulders down. Squeeze at peak."},
        {name:"Shoulder Shrug",equip:"Dumbbell",sets:1,reps:"10-15",weight:"",rest:"60s",
         cue:"Full shoulder depression before every rep. Straight up — no rolling."},
      ]},
      {section:"Legs",exercises:[
        {name:"Hip Thrust",equip:"Barbell",sets:1,reps:"6",weight:"120kg",rest:"2 min",
         cue:"Upper back on bench. One second pause at bottom. Drive to full hip extension — hard glute squeeze. Chin tucked."},
        {name:"Pendulum Squat",equip:"Machine",sets:1,reps:"5",weight:"25kg",rest:"2 min",
         cue:"Control descent to full depth. Drive through heels to lockout."},
        {name:"Leg Extensions",equip:"Machine",sets:1,reps:"10-12",weight:"",rest:"90s",
         cue:"Three second eccentric. Full extension at top."},
        {name:"Seated Leg Curl",equip:"Machine",sets:1,reps:"10-12",weight:"",rest:"90s",
         cue:"Full extension before every rep. Curl fully, control the negative."},
        {name:"Calf Raises",equip:"Machine",sets:1,reps:"7",weight:"140kg",rest:"75s",
         cue:"Deep stretch at the bottom of every rep. Non-negotiable. Full plantarflexion at top."},
        {name:"Inner Thigh Machine",equip:"Machine",sets:1,reps:"10-12",weight:"",rest:"60s",
         cue:"Full abduction before squeezing in."},
        {name:"Outer Thigh Machine",equip:"Machine",sets:1,reps:"6",weight:"79kg",rest:"60s",
         cue:"Start legs together. Full ROM outward. Control the return."},
      ]},
      {section:"Core + Prehab",exercises:[
        {name:"Core Twist",equip:"Band",sets:1,reps:"12 each",weight:"",rest:"60s",
         cue:"Controlled rotation. Resist the momentum on the return."},
        {name:"Ab Crunch Machine",equip:"Machine",sets:1,reps:"12-15",weight:"",rest:"60s",
         cue:"Ribs to hips — not neck. Slow return."},
        {name:"Back Extension",equip:"Bodyweight",sets:1,reps:"12-15",weight:"",rest:"60s",
         cue:"Hinge at hip to deep hamstring stretch. Drive to parallel — don't hyperextend."},
        {name:"Internal Shoulder Rotation",equip:"Cable Single",sets:1,reps:"12-15",weight:"",rest:"45s",
         cue:"Elbow at 90 degrees at side. Rotate inward. Light weight, full range."},
        {name:"External Shoulder Rotation",equip:"Cable Single",sets:1,reps:"12-15",weight:"",rest:"45s",
         cue:"Elbow at 90 degrees at side. Rotate outward. Keep upper arm still."},
        {name:"Wrist Curl",equip:"Band",sets:1,reps:"15-20",weight:"",rest:"45s",
         cue:"Forearm fully supported. Wrist only. Slow and full range."},
        {name:"Reverse Wrist Curl",equip:"Band",sets:1,reps:"15-20",weight:"",rest:"45s",
         cue:"Overhand grip. Wrist only. Full range. Slow eccentric."},
      ]},
    ];

    const TENDON = {
      p1:{label:"Phase 1",weeks:"Weeks 1-4",name:"Isometric",color:"#ff453a",
        meta:"Hold at about 2/10 effort — sustained tension, not force. Take 15g collagen + vit C 30-60 min before. No caffeine.",
        sessions:[
          {label:"Session A",day:"Achilles + Patellar",exercises:[
            {name:"Calf Raise Iso — Mid Range",equip:"Single leg + DB",sets:3,reps:"6",hold:"30s",weight:"+20-25kg DB",rest:"90s",cue:"Stand on one leg at mid-calf position. Hold completely still. The stimulus is sustained tension — no movement."},
            {name:"Wall Sit",equip:"Bodyweight",sets:3,reps:"6",hold:"30s",weight:"Bodyweight",rest:"90s",cue:"Back flat against wall, thighs parallel, knees at 90 degrees. Hold. Patellar tendon stimulus."},
            {name:"Calf Hold — Bottom Stretch",equip:"Single leg + DB",sets:2,reps:"6",hold:"20s",weight:"+15kg DB",rest:"60s",cue:"Heel dropped off a step as low as possible. Hold at the deepest Achilles stretch."},
            {name:"Hip Flexor Lunge Hold",equip:"Bodyweight",sets:2,reps:"6",hold:"20s",weight:"Bodyweight",rest:"60s",cue:"Back knee on floor, front foot forward, torso upright. Feel the stretch through front of rear hip. Hold still."},
            {name:"Wrist Iso Hold",equip:"Light band",sets:2,reps:"6",hold:"15s",weight:"Light band",rest:"45s",cue:"Press wrist into band and hold without moving. Three positions: neutral, flexion, extension."},
          ]},
          {label:"Session B",day:"Combat + Glute/Ham",exercises:[
            {name:"Wall Sit — Progressed",equip:"Bodyweight",sets:3,reps:"6",hold:"30s",weight:"Bodyweight",rest:"90s",cue:"Same as Session A, but add a slight heel raise at the bottom to load calves simultaneously."},
            {name:"Calf Raise Iso — Peak",equip:"Single leg + DB",sets:3,reps:"6",hold:"30s",weight:"+20kg DB",rest:"90s",cue:"Rise onto toes and hold at the very top. Different loading zone from Session A mid-range."},
            {name:"Wrist Iso — Extension",equip:"Light band",sets:2,reps:"6",hold:"15s",weight:"Light band",rest:"45s",cue:"Forearm on a surface. Resist band pulling wrist into extension. Hold completely still."},
            {name:"Wrist Iso — Flexion",equip:"Light band",sets:2,reps:"6",hold:"15s",weight:"Light band",rest:"45s",cue:"Same position. Resist band pulling wrist into flexion. Separate set from extension."},
            {name:"Glute Bridge Hold",equip:"Bodyweight",sets:2,reps:"6",hold:"30s",weight:"Bodyweight",rest:"60s",cue:"Hips fully extended, shoulders on floor. Hold at top. Hamstring and glute tendon stimulus."},
          ]},
        ]},
      p2:{label:"Phase 2",weeks:"Weeks 5-8",name:"Heavy Slow",color:"#ff9f0a",

    // ── WeightChip ─────────────────────────────────────────────────────────────
    function WeightChip({exKey,defaultWeight,color,weights,onSave}) {
      const [editing,setEditing]=useState(false);
      const ref=useRef(null);
      const stored=weights[exKey];
      const val=stored!==undefined?stored:(defaultWeight||"");
      const [draft,setDraft]=useState(val);
      const startEdit=e=>{e.stopPropagation();setDraft(val);setEditing(true);setTimeout(()=>{if(ref.current){ref.current.focus();ref.current.select();}},50);};
      const commit=()=>{onSave(exKey,draft.trim());setEditing(false);};
      if(editing) return <input ref={ref} value={draft} onChange={e=>setDraft(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEditing(false);}} onClick={e=>e.stopPropagation()} placeholder="e.g. 35kg" style={{background:"var(--accent-muted)",border:"1.5px solid var(--accent)",borderRadius:"8px",color:"var(--text)",fontSize:"13px",fontWeight:"700",padding:"6px 10px",width:"85px",textAlign:"center"}}/>;
      return <button onClick={startEdit} style={{background:val?"var(--accent-muted)":"var(--input-bg)",border:val?"1.5px solid var(--accent)":"1.5px solid var(--card-border)",borderRadius:"8px",color:val?"var(--accent)":"var(--text-secondary)",fontSize:"13px",fontWeight:"700",padding:"6px 12px"}}>{val||"Set Weight"}</button>;
    }

    // ── ProgressionChart ───────────────────────────────────────────────────────
    function ProgressionChart({data,selectedExercise}) {
      const canvasRef=useRef(null);
      useEffect(()=>{
        if(!canvasRef.current||!data||data.length<2) return;
        const canvas=canvasRef.current;
        const ctx=canvas.getContext('2d');
        const rect=canvas.getBoundingClientRect();
        canvas.width=rect.width*2; canvas.height=rect.height*2; ctx.scale(2,2);
        const w=rect.width,h=rect.height,pad=35;
        const parseW=str=>{if(!str)return 0;const n=parseFloat(str.replace(/[^\d.]/g,''));return isNaN(n)?0:n;};
        const pts=data.map(d=>({date:new Date(d.date),weight:parseW(d.weight),label:d.weight||"0"})).sort((a,b)=>a.date-b.date);
        const wts=pts.map(p=>p.weight),minW=Math.min(...wts)*0.9,maxW=Math.max(...wts)*1.1||10,rng=maxW-minW||10;
        ctx.clearRect(0,0,w,h);
        const isAR=document.documentElement.getAttribute('data-theme')==='anti-red';
        const sc=isAR?'#ffd700':'#bf5af2',gc=isAR?'rgba(255,215,0,0.15)':'rgba(255,255,255,0.08)',tc=isAR?'#ffd700':'#8e8e93';
        ctx.strokeStyle=gc; ctx.lineWidth=1; ctx.fillStyle=tc; ctx.font='10px sans-serif'; ctx.textAlign='right';
        for(let i=0;i<=3;i++){const y=pad+(h-pad*2)*(i/3),wv=maxW-rng*(i/3);ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-15,y);ctx.stroke();ctx.fillText(`${wv.toFixed(1)}kg`,pad-6,y+3);}
        const gx=i=>pad+(w-pad-20)*(i/(pts.length-1)),gy=v=>h-pad-(h-pad*2)*((v-minW)/rng);
        ctx.strokeStyle=sc; ctx.lineWidth=2.5; ctx.beginPath();
        pts.forEach((p,i)=>{const x=gx(i),y=gy(p.weight);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
        ctx.stroke();
        if(!isAR){ctx.fillStyle='rgba(191,90,242,0.1)';ctx.beginPath();ctx.moveTo(gx(0),h-pad);pts.forEach((p,i)=>ctx.lineTo(gx(i),gy(p.weight)));ctx.lineTo(gx(pts.length-1),h-pad);ctx.closePath();ctx.fill();}
        pts.forEach((p,i)=>{const x=gx(i),y=gy(p.weight);ctx.fillStyle=sc;ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();ctx.fillStyle=isAR?'#ffd700':'#fff';ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.fillText(p.label,x,y-8);ctx.fillStyle=tc;ctx.font='8px sans-serif';ctx.fillText(`${p.date.getMonth()+1}/${p.date.getDate()}`,x,h-pad+14);});
      },[data,selectedExercise]);
      if(!data||data.length<2) return <div className="chart-container" style={{display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text-secondary)",fontSize:"14px"}}>Complete this exercise twice to start tracking progression</div>;
      return <div className="chart-container"><canvas ref={canvasRef} className="chart-svg" style={{width:"100%",height:"100%"}}/></div>;
    }

    // ── SessionPlayer ──────────────────────────────────────────────────────────
    function SessionPlayer({routineName,exercises,onFinish,onCancel}) {
      const [exIdx,setExIdx]=useState(0);
      const [setIdx,setSetIdx]=useState(0);
      const [mode,setMode]=useState("work");
      const activeEx=exercises[exIdx];
      const nextEx=exIdx+1<exercises.length?exercises[exIdx+1]:null;
      const sideLabels=activeEx.sideLabels||[];
      const hasSides=sideLabels.length>0;
      const [currentSideIdx,setCurrentSideIdx]=useState(0);
      const [targetSeconds,setTargetSeconds]=useState(90);
      const [remaining,setRemaining]=useState(90);
      const [isRunning,setIsRunning]=useState(false);
      const startTimeRef=useRef(0);
      const accRef=useRef(0);
      const rafRef=useRef(null);
      const autoStartRestRef=useRef(false);

      const setupTimer=()=>{
        accRef.current=0;
        if(mode==="work"){
          if(activeEx.hold){const s=parseInt(activeEx.hold.replace(/[^\d]/g,''))||30;const p=hasSides?Math.round(s/sideLabels.length):s;setTargetSeconds(p);setRemaining(p);}
          else if(activeEx.totalSec){const p=hasSides?Math.round(activeEx.totalSec/sideLabels.length):activeEx.totalSec;setTargetSeconds(p);setRemaining(p);}
          else{setTargetSeconds(0);setRemaining(0);}
          setIsRunning(false);
        } else if(mode==="rest"){
          const rs=parseRestSec(activeEx.rest);
          setTargetSeconds(rs);setRemaining(rs);
          if(autoStartRestRef.current){
            autoStartRestRef.current=false;
            startTimeRef.current=Date.now();
            setIsRunning(true);
          } else {
            setIsRunning(false);
          }
        } else if(mode==="split_transition"){
          setTargetSeconds(3);setRemaining(3);
          startTimeRef.current=Date.now();
          setIsRunning(true);
        }
      };
      useEffect(()=>{setupTimer();},[exIdx,setIdx,mode,currentSideIdx]);

      const modeRef=useRef(mode);
      useEffect(()=>{modeRef.current=mode;},[mode]);
      const targetRef=useRef(targetSeconds);
      useEffect(()=>{targetRef.current=targetSeconds;},[targetSeconds]);

      const handleTimerComplete=()=>{
        setIsRunning(false);
        const m=modeRef.current;
        if(m==="work"){
          if(hasSides&&currentSideIdx+1<sideLabels.length){triggerSound('beep-high');setMode("split_transition");}
          else{triggerSound('chime');onLogSet(activeEx,activeEx.weight||"");if(activeEx.rest&&activeEx.rest!=="0s"){autoStartRestRef.current=true;setMode("rest");}else moveToNext();}
        } else if(m==="rest"){triggerSound('rest-chime');moveToNext();}
        else if(m==="split_transition"){setCurrentSideIdx(currentSideIdx+1);setMode("work");}
      };

      const tick=useRef(null);
      tick.current=()=>{
        const now=Date.now();
        const elapsedMs=now-startTimeRef.current+accRef.current;
        const elapsedSec=Math.floor(elapsedMs/1000);
        const rem=Math.max(0,targetRef.current-elapsedSec);
        setRemaining(rem);
        if(rem<=0){handleTimerComplete();}
        else{rafRef.current=requestAnimationFrame(()=>tick.current());}
      };

      useEffect(()=>{
        if(isRunning){
          accRef.current=0;
          startTimeRef.current=Date.now();
          rafRef.current=requestAnimationFrame(()=>tick.current());
        } else {
          cancelAnimationFrame(rafRef.current);
        }
        return()=>cancelAnimationFrame(rafRef.current);
      },[isRunning]);

      const toggleTimer=()=>{
        if(isRunning){accRef.current+=Date.now()-startTimeRef.current;setIsRunning(false);}
        else{startTimeRef.current=Date.now();setIsRunning(true);}
      };
      const restartTimer=()=>{
        cancelAnimationFrame(rafRef.current);
        accRef.current=0;
        setRemaining(targetSeconds);
        startTimeRef.current=Date.now();
        if(isRunning) rafRef.current=requestAnimationFrame(()=>tick.current());
      };
      const skipTimer=()=>{
        setIsRunning(false);
        if(mode==="work"){
          if(hasSides&&currentSideIdx+1<sideLabels.length){setCurrentSideIdx(currentSideIdx+1);}
          else{onLogSet(activeEx,activeEx.weight||"");if(activeEx.rest&&activeEx.rest!=="0s"){autoStartRestRef.current=true;setMode("rest");}else moveToNext();}
        } else moveToNext();
      };
      const moveToNext=()=>{setCurrentSideIdx(0);const maxSets=activeEx.sets||1;if(setIdx+1<maxSets){setSetIdx(setIdx+1);setMode("work");}else{if(exIdx+1<exercises.length){setExIdx(exIdx+1);setSetIdx(0);setMode("work");}else{onLogSession(exercises.length,exercises.length,false);onFinish();}}};
      const finishEarly=()=>{if(confirm("Finish early? Progress logged as partial.")){onLogSession(exercises.length,exIdx,true);onFinish();}};
      const onLogSet=(ex,weight)=>{const p=store.get("workout_progression",[]);p.push({id:uid(),date:new Date().toISOString().split('T')[0],exercise:ex.name,weight:weight||"0",hold:ex.hold||"0"});store.set("workout_progression",p);};
      const onLogSession=(total,completed,isPartial)=>{const logs=store.get("workout_logs",[]);logs.push({id:uid(),date:new Date().toISOString().split('T')[0],routine:routineName,total,completed,isPartial});store.set("workout_logs",logs);const c=store.get("workout_completed_counts",{workouts:0,tendons:0,stretches:0});if(routineName.includes("Stretch"))c.stretches+=1;else if(routineName.includes("Tendon"))c.tendons+=1;else c.workouts+=1;store.set("workout_completed_counts",c);};

      const progressPercent=targetSeconds>0?((targetSeconds-remaining)/targetSeconds)*100:0;
      const strokeDashoffset=628-(628*progressPercent)/100;

      return (
        <div className="timer-overlay">
          <div className="flex-between" style={{width:"100%",marginBottom:"10px"}}>
            <div>
              <span className="badge" style={{marginLeft:"0"}}>{routineName}</span>
              <p className="text-small" style={{marginTop:"4px"}}>Exercise {exIdx+1} of {exercises.length} — Set {setIdx+1} of {activeEx.sets||1}</p>
            </div>
            <button style={{border:"1.5px solid var(--danger)",color:"var(--danger)",background:"transparent",borderRadius:"10px",padding:"6px 12px",fontSize:"12px",fontWeight:"700"}} onClick={finishEarly}>Finish Early</button>
          </div>

          <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center"}}>
            {mode==="split_transition"&&<div className="card text-warning" style={{borderColor:"var(--warning)",width:"100%",textAlign:"center",padding:"12px",fontSize:"18px",fontWeight:"800"}}>Change side — {sideLabels[currentSideIdx+1]}</div>}
            <h2 className="font-bold" style={{fontSize:"24px",textAlign:"center",marginBottom:"4px"}}>{activeEx.name}</h2>
            <p className="text-small font-bold" style={{textTransform:"uppercase",letterSpacing:"0.05em",color:"var(--accent)"}}>
              {mode==="work"&&(hasSides?`${sideLabels[currentSideIdx]} hold`:"Active Work")}
              {mode==="rest"&&"Resting"}
              {mode==="split_transition"&&"Transition"}
            </p>
            {((mode==="work"&&targetSeconds>0)||mode==="rest"||mode==="split_transition")?(
              <div className="timer-circle-container">
                <svg className="timer-circle-svg" viewBox="0 0 220 220">
                  <circle className="timer-circle-bg" cx="110" cy="110" r="100"/>
                  <circle className="timer-circle-progress" cx="110" cy="110" r="100" strokeDasharray="628" strokeDashoffset={strokeDashoffset}/>
                </svg>
                <div className="timer-display"><span>{fmtTime(remaining)}</span><span className="timer-label">{mode==="work"?"hold":"rest"}</span></div>
              </div>
            ):(
              <div style={{margin:"40px auto",textAlign:"center"}}>
                {mode==="work"&&<div><div style={{fontSize:"52px",fontWeight:"900"}}>{activeEx.reps}</div><div className="timer-label" style={{fontSize:"14px"}}>Target Reps</div>{activeEx.weight&&<div className="badge" style={{marginTop:"12px",fontSize:"14px",padding:"6px 14px"}}>{activeEx.weight}</div>}</div>}
              </div>
            )}
            {mode==="work"&&<div className="exercise-cue-box" style={{width:"100%",maxHeight:"110px",overflowY:"auto"}}><strong>Cue:</strong> {activeEx.cue}</div>}
            {mode==="rest"&&nextEx&&(
              <div className="card" style={{width:"100%",background:"var(--input-bg)"}}>
                <p className="text-small font-bold" style={{textTransform:"uppercase",color:"var(--accent)"}}>Up Next</p>
                <p className="font-bold" style={{fontSize:"16px",marginTop:"2px"}}>{nextEx.name}</p>
                <p className="text-small" style={{fontSize:"12px"}}>{nextEx.equip} — {nextEx.sets} set{nextEx.sets>1?"s":""} — {nextEx.reps||nextEx.hold}</p>
              </div>
            )}
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:"16px",alignItems:"center"}}>
            {((mode==="work"&&targetSeconds>0)||mode==="rest")&&(
              <div style={{display:"flex",gap:"24px",alignItems:"center"}}>
                <button className="restart-btn" onClick={restartTimer}><Icons.Refresh size={22}/></button>
                <button className="play-pause-btn" onClick={toggleTimer}>{isRunning?<Icons.Pause size={28}/>:<Icons.Play size={28}/>}</button>
                <div style={{width:"52px"}}/>
              </div>
            )}
            {mode==="work"&&targetSeconds===0&&<button className="button-primary" style={{padding:"16px 20px",fontSize:"18px"}} onClick={handleTimerComplete}>Set Completed</button>}
            <button className="skip-btn-large" onClick={skipTimer}>Skip {mode==="work"?"Hold":"Rest"} →</button>
          </div>
        </div>
      );
    }

    // ── App ────────────────────────────────────────────────────────────────────
    function App() {
      const [activeTab,setActiveTab]=useState("home");
      const [theme,setTheme]=useState(()=>store.get("workout_theme","dark"));
      const [weights,setWeights]=useState(()=>store.get("workout_weights",{}));

      const [logs,setLogs]=useState(()=>store.get("workout_logs",[]));
      const [counts,setCounts]=useState(()=>store.get("workout_completed_counts",{workouts:0,tendons:0,stretches:0}));
      const [activeRoutine,setActiveRoutine]=useState(null);
      const [modalContent,setModalContent]=useState(null);

      useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);store.set("workout_theme",theme);},[theme]);
      const reloadLogs=()=>{setLogs(store.get("workout_logs",[]));setCounts(store.get("workout_completed_counts",{workouts:0,tendons:0,stretches:0}));};
      const saveWeight=(k,v)=>{const u={...weights,[k]:v};setWeights(u);store.set("workout_weights",u);};
      const cycleTheme=()=>{const t=["dark","light","anti-red"];setTheme(t[(t.indexOf(theme)+1)%t.length]);};

      const handleEditSave=updatedEx=>{
        if(!modalContent?.data) return;
        const u=workouts.map(s=>s.section===modalContent.data.secName?{...s,exercises:s.exercises.map(e=>e.name===modalContent.data.ex.name?updatedEx:e)}:s);
        setWorkouts(u); store.set("workout_sections_custom",u); setModalContent(null);
      };
      const handleEditDelete=()=>{
        if(!modalContent?.data) return;
        const u=workouts.map(s=>s.section===modalContent.data.secName?{...s,exercises:s.exercises.filter(e=>e.name!==modalContent.data.ex.name)}:s);
        setWorkouts(u); store.set("workout_sections_custom",u); setModalContent(null);
      };

      // ── Home tab ─────────────────────────────────────────────────────────────
      const renderHome=()=>{
        const today=new Date();
        const last30=[];
        for(let i=29;i>=0;i--){
          const d=new Date(); d.setDate(today.getDate()-i);
          const ds=d.toISOString().split('T')[0];
          const dl=logs.filter(l=>l.date===ds);
          let status="none";
          if(dl.length>0) status=dl.some(l=>!l.isPartial)?"completed":"partial";
          last30.push({date:ds,dayNum:d.getDate(),status,logs:dl});
        }
        const showDay=day=>{if(day.logs.length>0) setModalContent({type:"day_details",data:day});};
        return (
          <div>
            <div className="card">
              <h2 className="font-bold" style={{fontSize:"20px",marginBottom:"4px"}}>Training Log</h2>
              <p className="text-small">Strength, tendon, and mobility tracking</p>
              <div className="badge-bar" style={{marginTop:"16px"}}>
                <div className="session-badge"><span>Workouts:</span><span className="text-accent font-bold">{counts.workouts}</span></div>
                <div className="session-badge"><span>Tendon:</span><span className="text-accent font-bold">{counts.tendons}</span></div>
                <div className="session-badge"><span>Stretches:</span><span className="text-accent font-bold">{counts.stretches}</span></div>
              </div>
            </div>
            <div className="card">
              <h3 className="font-bold" style={{fontSize:"16px"}}>30-Day Grid</h3>
              <p className="text-small" style={{marginBottom:"12px"}}>Tap a highlighted day to view session logs</p>
              <div className="calendar-grid">
                {["S","M","T","W","T","F","S"].map((h,i)=><div key={i} className="calendar-header-day">{h}</div>)}
                {Array.from({length:new Date(last30[0].date).getDay()}).map((_,i)=><div key={`p${i}`} className="calendar-day-box empty"/>)}
                {last30.map((day,i)=>(
                  <div key={i} onClick={()=>showDay(day)} className={`calendar-day-box ${day.status==="completed"?"completed":""} ${day.status==="partial"?"partial":""} ${day.date===today.toISOString().split('T')[0]?"today":""}`}>
                    <span>{day.dayNum}</span>
                  </div>
                ))}
              </div>
            </div>
            <SoundConfigCard/>
            <WakeLockToggle/>
          </div>
        );
      };

      // ── Modal renderer ────────────────────────────────────────────────────────
      const renderModal=()=>{
        if(!modalContent) return null;
        if(modalContent.type==="day_details"){
          const day=modalContent.data;
          return (
            <TapModal isOpen onClose={()=>setModalContent(null)}>
              <h3 className="font-bold" style={{fontSize:"18px",marginBottom:"12px"}}>{day.date}</h3>
              {day.logs.map((l,i)=>(
                <div key={i} className="card" style={{background:"var(--input-bg)",marginBottom:"8px"}}>
                  <div className="flex-between">
                    <p className="font-bold">{l.routine}</p>
                    <span className={l.isPartial?"text-warning font-bold":"text-success font-bold"}>{l.isPartial?"Partial":"Done"}</span>
                  </div>
                  <p className="text-small" style={{marginTop:"4px"}}>{l.completed} of {l.total} exercises</p>
                </div>
              ))}
            </TapModal>
          );
        }
        if(modalContent.type==="edit_exercise"){
          return (
            <TapModal isOpen onClose={()=>setModalContent(null)}>
              <EditModal ex={modalContent.data.ex} onSave={handleEditSave} onDelete={handleEditDelete} onClose={()=>setModalContent(null)}/>
            </TapModal>
          );
        }
        return null;
      };

      return (
        <div>
          <header>
            <div className="app-title font-bold text-accent">WORKOUT</div>
            <button onClick={cycleTheme} style={{border:"1.5px solid var(--card-border)",borderRadius:"20px",padding:"6px 14px",fontSize:"12px",fontWeight:"700",textTransform:"uppercase"}}>
              {theme}
            </button>
          </header>

          {activeRoutine&&(
            <SessionPlayer routineName={activeRoutine.name} exercises={activeRoutine.exercises}
              onFinish={()=>{setActiveRoutine(null);reloadLogs();}}
              onCancel={()=>setActiveRoutine(null)}/>
          )}

          <div className="container">
            {activeTab==="home"&&renderHome()}
            {activeTab==="workouts"&&<WorkoutsTab workouts={workouts} setWorkouts={setWorkouts} weights={weights} saveWeight={saveWeight} counts={counts} setActiveRoutine={setActiveRoutine} setModalContent={setModalContent}/>}
            {activeTab==="tendons"&&<TendonsTab weights={weights} saveWeight={saveWeight} counts={counts} setActiveRoutine={setActiveRoutine}/>}
            {activeTab==="stretches"&&<StretchesTab counts={counts} setActiveRoutine={setActiveRoutine}/>}
            {activeTab==="progression"&&<ProgressionTab reloadLogs={reloadLogs}/>}
          </div>

          {renderModal()}

          <div className="tab-bar">
            {[{id:"home",label:"Home",Icon:Icons.Home},{id:"workouts",label:"Workouts",Icon:Icons.Dumbbell},{id:"tendons",label:"Tendons",Icon:Icons.Tendon},{id:"stretches",label:"Stretch",Icon:Icons.Stretch},{id:"progression",label:"Progress",Icon:Icons.Chart}].map(({id,label,Icon})=>(
              <button key={id} className={`tab-btn ${activeTab===id?"active":""}`} onClick={()=>setActiveTab(id)}>
                <Icon/><span>{label}</span>
              </button>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
