// ─── WEIGHT CHIP ─────────────────────────────────────────────────────────────

function WeightChip({ exKey, defaultWeight, color, weights, onSave }) {
  const [editing, setEditing] = useState(false);
  const inputRef = useRef(null);
  const stored = weights[exKey];
  const current = stored !== undefined ? stored : (defaultWeight || "");
  const [draft, setDraft] = useState(current);

  const startEdit = (e) => {
    e.stopPropagation();
    setDraft(current);
    setEditing(true);
    setTimeout(() => { if (inputRef.current) { inputRef.current.focus(); inputRef.current.select(); } }, 30);
  };

  const commit = () => { onSave(exKey, draft.trim()); setEditing(false); };

  if (editing) {
    return (
      <input
        ref={inputRef}
        value={draft}
        onChange={(e) => setDraft(e.target.value)}
        onBlur={commit}
        onKeyDown={(e) => { if (e.key === "Enter") commit(); if (e.key === "Escape") setEditing(false); }}
        placeholder="e.g. 30kg"
        style={{
          background: "#1e1e1e", border: `1.5px solid ${color}`,
          borderRadius: "7px", color: "#fff",
          fontSize: "12px", fontWeight: "600",
          padding: "4px 9px", outline: "none", width: "120px",
        }}
      />
    );
  }

  return (
    <div onClick={startEdit} style={{
      display: "inline-flex", alignItems: "center", gap: "5px",
      fontSize: "12px", fontWeight: "600",
      color: current ? color : "#3a3a3a",
      background: "#161616",
      border: `1px solid ${current ? color + "35" : "#222"}`,
      padding: "4px 9px", borderRadius: "7px",
      cursor: "pointer", userSelect: "none",
    }}>
      {current ? <><span>{current}</span><span style={{ fontSize: "9px", color: "#555" }}>✏</span></> : <span>＋ weight</span>}
    </div>
  );
}

// ─── EXERCISE CARD ────────────────────────────────────────────────────────────

function ExerciseCard({ ex, idx, color, weights, onSave }) {
  const [open, setOpen] = useState(false);
  const [done, setDone] = useState(false);
  const repsLine = ex.hold ? `${ex.sets}×${ex.reps} · ${ex.hold}` : `${ex.sets}×${ex.reps}`;

  return (
    <div style={{
      background: ex.hero ? color + "0f" : "#111",
      border: `1px solid ${ex.hero ? color + "45" : "#1d1d1d"}`,
      borderRadius: "13px", marginBottom: "7px", overflow: "hidden",
      opacity: done ? 0.35 : 1, transition: "opacity 0.18s",
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: "10px", padding: "13px 13px 0" }}>
        <div onClick={() => setDone(d => !d)} style={{
          width: "28px", height: "28px", borderRadius: "50%", flexShrink: 0,
          border: done ? "none" : `1.5px solid ${color}50`,
          background: done ? color : "transparent",
          display: "flex", alignItems: "center", justifyContent: "center",
          cursor: "pointer", fontSize: done ? "13px" : "11px",
          fontWeight: "800", color: done ? "#000" : color,
        }}>
          {done ? "✓" : idx + 1}
        </div>
        <div style={{ flex: 1, minWidth: 0 }} onClick={() => setOpen(o => !o)}>
          <div style={{
            fontSize: "14px", fontWeight: "600", color: ex.hero ? color : "#efefef",
            lineHeight: "1.3", display: "flex", alignItems: "center", flexWrap: "wrap", gap: "6px",
          }}>
            {ex.name}
            {ex.hero && <span style={{ fontSize: "9px", background: color, color: "#000", padding: "2px 6px", borderRadius: "4px", fontWeight: "800" }}>HERO</span>}
          </div>
          <div style={{ fontSize: "11px", color: "#404040", marginTop: "2px" }}>{ex.equip}</div>
        </div>
        <div style={{ textAlign: "right", flexShrink: 0 }} onClick={() => setOpen(o => !o)}>
          <div style={{ fontSize: "12px", fontWeight: "700", color: "#ddd" }}>{repsLine}</div>
          {ex.tempo && <div style={{ fontSize: "10px", color: "#555", marginTop: "2px" }}>{ex.tempo}</div>}
        </div>
      </div>

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 13px 11px", gap: "8px" }}>
        <WeightChip exKey={ex.name} defaultWeight={ex.defaultWeight} color={color} weights={weights} onSave={onSave} />
        <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
          <span style={{ fontSize: "11px", color: "#555", background: "#1a1a1a", padding: "3px 8px", borderRadius: "6px" }}>⏱ {ex.rest}</span>
          <span onClick={() => setOpen(o => !o)} style={{ fontSize: "11px", color: "#333", cursor: "pointer", padding: "4px" }}>{open ? "▲" : "▼"}</span>
        </div>
      </div>

      {open && (
        <div style={{ padding: "11px 13px 14px", borderTop: "1px solid #1a1a1a", background: "#0c0c0c", fontSize: "13px", color: "#bbb", lineHeight: "1.65" }}>
          {ex.cue}
        </div>
      )}
    </div>
  );
}

    const updated = { ...weights, [exKey]: value };

                background: active ? t.color + "18" : "transparent",
                color: active ? t.color : "#444",
                fontSize: "11px", fontWeight: "800", letterSpacing: "0.03em",
                cursor: "pointer", transition: "all 0.12s",
              }}>
                {t.label}
              </button>
            );
          })}
        </div>
        <div style={{ paddingLeft: "2px" }}>
          <div style={{ fontSize: "19px", fontWeight: "700", lineHeight: "1.2" }}>{tabTitle[tab]}</div>
          {tabSub[tab] && <div style={{ fontSize: "12px", color: "#555", marginTop: "2px" }}>{tabSub[tab]}</div>}
        </div>
      </div>

      {tab === "fb" && <FBView weights={weights} onSave={handleSave} />}
      {tab !== "fb" && <TendonView data={tabData[tab]} color={tabColor[tab]} weights={weights} onSave={handleSave} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
