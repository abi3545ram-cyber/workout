const parseRestSec = r => {
  if (!r) return 90;
  const m = r.match(/(\d+(?:\.\d+)?)\s*min/);
  if (m) return Math.round(parseFloat(m[1]) * 60);
  const s = r.match(/(\d+)s/);
  if (s) return parseInt(s[1]);
  return 90;
};
const fmtTime = s => s <= 0 ? "0:00" : `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

// ── Weight chip ───────────────────────────────────────────────────────────────
function WeightChip({exKey, defaultWeight, color, weights, onSave}) {
  const [editing, setEditing] = useState(false);
  const ref = useRef(null);
  const stored = weights[exKey];
  const val = stored !== undefined ? stored : (defaultWeight || "");
  const [draft, setDraft] = useState(val);

  const startEdit = e => {
    e.stopPropagation();
    setDraft(val);
    setEditing(true);
    setTimeout(() => { if (ref.current) { ref.current.focus(); ref.current.select(); } }, 20);
  };
  const commit = () => { onSave(exKey, draft.trim()); setEditing(false); };

  if (editing) return (
    <input ref={ref} value={draft}
      onChange={e => setDraft(e.target.value)}
      onBlur={commit}
      onKeyDown={e => { if (e.key === "Enter") commit(); if (e.key === "Escape") setEditing(false); }}
      onClick={e => e.stopPropagation()}
      placeholder="e.g. 30kg"
      style={{background:`${color}16`,border:`1.5px solid ${color}`,borderRadius:"8px",
        color:"#fff",fontSize:"14px",fontWeight:"600",padding:"7px 12px",width:"112px",
        boxShadow:`0 0 0 3px ${color}12`}}
    />
  );

  return (
    <button onClick={startEdit} style={{
      background:`${color}14`,
      border:`1px solid ${color}70`,
      borderRadius:"8px", color: val ? "#fff" : color,
      fontSize:"14px", fontWeight:"700",
      padding:"7px 12px", cursor:"pointer",
      boxShadow:`inset 0 0 0 1px ${color}18`,
    }}>
      {val || "Set weight"}
    </button>
  );
}

// ── Session ───────────────────────────────────────────────────────────────────
function Session({exercises, color, weights, onSave, onExit}) {
  const [exIdx, setExIdx] = useState(0);
  const [setNum, setSetNum] = useState(1);
  const [phase, setPhase] = useState("working");
  const [restSec, setRestSec] = useState(0);
  const [sessionReps, setSessionReps] = useState({});
  const restTotal = useRef(0);
  const timer = useRef(null);

  const ex = exercises[exIdx] || exercises[0];
  const totalSets = ex ? ex.sets : 1;
  const doneSets = exercises.slice(0, exIdx).reduce((a, e) => a + e.sets, 0) + setNum - 1;
  const allSets = exercises.reduce((a, e) => a + e.sets, 0);
  const setKey = ex ? `${ex.name}-${setNum}` : "";
  const actualReps = sessionReps[setKey] !== undefined ? sessionReps[setKey] : (ex?.reps || "");
  const saveActualReps = value => setSessionReps(p => ({...p, [setKey]: value}));

  const clearTimer = () => { if (timer.current) { clearInterval(timer.current); timer.current = null; } };

  const advance = () => {
    clearTimer(); setRestSec(0);
    const lastSet = setNum >= totalSets;
    const lastEx = exIdx >= exercises.length - 1;
    if (lastSet && lastEx) { setPhase("done"); return; }
    if (lastSet) { setExIdx(i => i + 1); setSetNum(1); }
    else setSetNum(s => s + 1);
    setPhase("working");
  };

  const logSet = () => {
    clearTimer();
    const lastSet = setNum >= totalSets;
    const lastEx = exIdx >= exercises.length - 1;
    if (lastSet && lastEx) { setPhase("done"); return; }
    const secs = parseRestSec(ex.rest);
    restTotal.current = secs;
    setRestSec(secs);
    setPhase("resting");
    timer.current = setInterval(() => setRestSec(s => {
      if (s <= 1) { clearTimer(); advance(); return 0; }
      return s - 1;
    }), 1000);
  };

  const goTo = i => {
    clearTimer();
    setExIdx(Math.max(0, Math.min(i, exercises.length - 1)));
    setSetNum(1); setPhase("working"); setRestSec(0);
  };

  useEffect(() => () => clearTimer(), []);

  if (phase === "done") return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
      height:"100%",padding:"40px 24px",textAlign:"center"}}>
      <div style={{width:"64px",height:"64px",borderRadius:"50%",background:`${color}20`,
        display:"flex",alignItems:"center",justifyContent:"center",marginBottom:"20px"}}>
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h2 style={{fontSize:"26px",fontWeight:"700",marginBottom:"8px"}}>Session complete</h2>
      <p style={{fontSize:"15px",color:"#8e8e93",marginBottom:"40px"}}>{allSets} sets done</p>
      <button onClick={onExit} style={{padding:"16px 48px",borderRadius:"14px",
        background:color,color:"#000",fontSize:"17px",fontWeight:"700",cursor:"pointer",border:"none"}}>
        Finish
      </button>
    </div>
  );

  const R = 42, C = 2 * Math.PI * R;
  const ringProg = restTotal.current > 0 ? (restTotal.current - restSec) / restTotal.current : 0;

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"14px 18px",borderBottom:"1px solid rgba(255,255,255,0.07)",flexShrink:0}}>
        <button onClick={onExit} style={{background:"none",color:"#8e8e93",fontSize:"14px",
          fontWeight:"500",cursor:"pointer",border:"none"}}>
          Back to list
        </button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:"14px",fontWeight:"600",color:"#fff"}}>{doneSets} / {allSets} sets</div>
          <div style={{fontSize:"12px",color:"#636366",marginTop:"1px"}}>{exIdx + 1} of {exercises.length}</div>
        </div>
        <div style={{display:"flex",gap:"8px"}}>
          <button onClick={()=>goTo(exIdx-1)} disabled={exIdx===0} style={{
            background:"#2c2c2e",color:exIdx===0?"#3a3a3c":"#8e8e93",
            padding:"7px 12px",borderRadius:"9px",fontSize:"14px",fontWeight:"600",
            cursor:exIdx===0?"default":"pointer",border:"none"}}>
            ←
          </button>
          <button onClick={()=>goTo(exIdx+1)} disabled={exIdx===exercises.length-1} style={{
            background:"#2c2c2e",color:exIdx===exercises.length-1?"#3a3a3c":"#8e8e93",
            padding:"7px 12px",borderRadius:"9px",fontSize:"14px",fontWeight:"600",
            cursor:exIdx===exercises.length-1?"default":"pointer",border:"none"}}>
            →
          </button>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"24px 20px 0"}}>
        {ex.section && (
          <div style={{fontSize:"12px",fontWeight:"600",color:"#636366",
            textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"10px"}}>
            {ex.section}
          </div>
        )}
        <h2 style={{fontSize:"28px",fontWeight:"700",lineHeight:"1.2",
          marginBottom:"6px",color:ex.hero?color:"#fff"}}>{ex.name}</h2>
        <p style={{fontSize:"15px",color:"#636366",marginBottom:"24px"}}>{ex.equip}</p>

        <div style={{display:"flex",gap:"6px",marginBottom:"24px"}}>
          {Array.from({length:totalSets},(_,i)=>(
            <div key={i} style={{flex:1,height:"4px",borderRadius:"2px",
              background:i<setNum-1?color:i===setNum-1?"#fff":"rgba(255,255,255,0.15)",
              transition:"background 0.25s"}}/>
          ))}
        </div>

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
          <div>
            <span style={{fontSize:"36px",fontWeight:"800",color:color}}>Set {setNum}</span>
            <span style={{fontSize:"18px",color:"#636366",fontWeight:"400"}}> / {totalSets}</span>
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"18px"}}>

// ── Stretch timer ─────────────────────────────────────────────────────────────
function StretchTimer({phase, onExit}) {
  const meta = SPHASE[phase];
  const [idx, setIdx] = useState(0);
  const [sec, setSec] = useState(0);
  const [sideIdx, setSideIdx] = useState(0);
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);
  const timer = useRef(null);

  const numSides = s => s.sideLabels.length || 1;
  const secsPerSide = s => Math.round(s.totalSec / numSides(s));
  const cumulativeStarts = [];
  let cum = 0;
  STRETCHES.forEach(s => { cumulativeStarts.push(cum); cum += s.totalSec; });

  const clearTimer = () => { if (timer.current) { clearInterval(timer.current); timer.current = null; } };

  useEffect(() => {
    if (!running) return;
    timer.current = setInterval(() => {
      setSec(prev => {
        const stretch = STRETCHES[idx];
        const next = prev + 1;
        const newSide = Math.min(Math.floor(next / secsPerSide(stretch)), numSides(stretch) - 1);
        if (newSide !== sideIdx) setSideIdx(newSide);
        if (next >= stretch.totalSec) {
          clearTimer(); setRunning(false);
          if (idx < STRETCHES.length - 1) {
            setTimeout(() => { setIdx(i => i + 1); setSec(0); setSideIdx(0); setRunning(true); }, 700);
          } else {
            setDone(true);
          }
          return stretch.totalSec;
        }
        return next;
      });
    }, 1000);
    return clearTimer;
  }, [running, idx, sideIdx]);

  useEffect(() => () => clearTimer(), []);

  const next = () => { clearTimer(); setRunning(false); if (idx < STRETCHES.length-1) { setIdx(i=>i+1); setSec(0); setSideIdx(0); } };
  const prev = () => { clearTimer(); setRunning(false); if (idx > 0) { setIdx(i=>i-1); setSec(0); setSideIdx(0); } };
  const reset = () => { clearTimer(); setRunning(false); setIdx(0); setSec(0); setSideIdx(0); setDone(false); };

  if (done) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
      height:"100%",padding:"40px 24px",textAlign:"center"}}>
      <div style={{width:"64px",height:"64px",borderRadius:"50%",background:`${meta.color}20`,
        display:"flex",alignItems:"center",justifyContent:"center",marginBottom:"20px"}}>
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={meta.color} strokeWidth="2.5" strokeLinecap="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h2 style={{fontSize:"26px",fontWeight:"700",marginBottom:"8px"}}>All done</h2>
      <p style={{fontSize:"15px",color:"#8e8e93",marginBottom:"40px"}}>20 minutes · 13 stretches</p>
      <div style={{display:"flex",gap:"12px"}}>
        <button onClick={reset} style={{padding:"15px 28px",borderRadius:"13px",
          background:"#2c2c2e",color:"#8e8e93",fontSize:"15px",fontWeight:"600",cursor:"pointer",border:"none"}}>
          Again
        </button>
        <button onClick={onExit} style={{padding:"15px 28px",borderRadius:"13px",
          background:meta.color,color:"#000",fontSize:"15px",fontWeight:"700",cursor:"pointer",border:"none"}}>
          Done
        </button>
      </div>
    </div>
  );

  const stretch = STRETCHES[idx];
  const sps = secsPerSide(stretch);
  const sideElapsed = sec - sideIdx * sps;
  const frac = Math.min(sideElapsed / sps, 1);
  const R = 40, Circ = 2 * Math.PI * R;
  const elapsed = cumulativeStarts[idx] + sec;
  const pct = Math.min(Math.round(elapsed / cum * 100), 100);
  const em = Math.floor(elapsed / 60), es = elapsed % 60;
  const how = stretch.phases[phase]?.how || stretch.phases[1].how;
  const dur = stretch.phases[phase]?.dur || "";

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{padding:"12px 18px 0",display:"flex",alignItems:"center",gap:"8px",flexShrink:0}}>
        <div style={{display:"flex",gap:"4px",flex:1,flexWrap:"wrap"}}>
          {STRETCHES.map((_,i) => (
            <div key={i} style={{width:"8px",height:"8px",borderRadius:"50%",
              background:i<idx?meta.color:i===idx?"#fff":"rgba(255,255,255,0.15)",
              transition:"background 0.3s"}}/>
          ))}
        </div>
        <span style={{fontSize:"13px",color:"#636366"}}>{idx+1} / 13</span>
        <button onClick={onExit} style={{background:"none",color:"#636366",fontSize:"14px",
          cursor:"pointer",border:"none",padding:"0 0 0 12px",fontWeight:"500"}}>
          Exit
        </button>
      </div>

      <div style={{flex:1,padding:"14px 18px",overflowY:"auto"}}>
        <div style={{background:"#1c1c1e",border:"1px solid rgba(255,255,255,0.06)",
          borderRadius:"18px",padding:"18px"}}>
          <div style={{display:"flex",gap:"18px"}}>
            <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:"10px"}}>
              <svg width="92" height="92" viewBox="0 0 92 92">
                <circle cx="46" cy="46" r={R} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="6"/>
                <circle cx="46" cy="46" r={R} fill="none" stroke={meta.color} strokeWidth="6"
                  strokeDasharray={Circ} strokeDashoffset={frac*Circ} strokeLinecap="round"
                  transform="rotate(-90 46 46)" style={{transition:"stroke-dashoffset 0.95s linear"}}/>
                <text x="46" y="53" textAnchor="middle" style={{fontSize:"17px",fontWeight:"700",fill:"#fff"}}>
                  {Math.max(stretch.totalSec - sec, 0)}s
                </text>
              </svg>
              <span style={{fontSize:"12px",color:"#636366",textAlign:"center",maxWidth:"92px",minHeight:"16px",fontStyle:"italic"}}>
                {stretch.sideLabels.length > 0
                  ? stretch.sideLabels[Math.min(sideIdx, stretch.sideLabels.length-1)]
                  : running ? "hold" : sec > 0 ? "paused" : "ready"}
              </span>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",gap:"5px",marginBottom:"8px",flexWrap:"wrap"}}>
                {stretch.priority && <span style={{fontSize:"11px",fontWeight:"600",
                  background:`${meta.color}22`,color:meta.color,padding:"3px 8px",borderRadius:"6px"}}>Priority</span>}
                {stretch.isNew && <span style={{fontSize:"11px",fontWeight:"600",
                  background:"rgba(48,209,88,0.15)",color:"#30d158",padding:"3px 8px",borderRadius:"6px"}}>New</span>}
                {stretch.isDynamic && <span style={{fontSize:"11px",fontWeight:"600",
                  background:"rgba(10,132,255,0.15)",color:"#0a84ff",padding:"3px 8px",borderRadius:"6px"}}>Dynamic</span>}
              </div>
              <h3 style={{fontSize:"19px",fontWeight:"700",lineHeight:"1.2",marginBottom:"5px"}}>{stretch.name}</h3>
              <p style={{fontSize:"13px",color:meta.color,fontWeight:"600",marginBottom:"6px"}}>{dur}</p>
              <p style={{fontSize:"13px",color:"#636366"}}>{stretch.muscles.join(" · ")}</p>
            </div>
          </div>
          <p style={{fontSize:"14px",color:"#8e8e93",lineHeight:"1.7",
            marginTop:"16px",paddingTop:"14px",borderTop:"1px solid rgba(255,255,255,0.07)"}}>{how}</p>
        </div>
      </div>

      <div style={{padding:"12px 18px",borderTop:"1px solid rgba(255,255,255,0.07)",flexShrink:0,
        paddingBottom:"calc(12px + env(safe-area-inset-bottom))"}}>
        <div style={{display:"flex",gap:"10px",marginBottom:"12px"}}>
          <button onClick={prev} style={{padding:"14px 18px",borderRadius:"13px",
            background:"#2c2c2e",color:"#8e8e93",fontSize:"16px",fontWeight:"600",cursor:"pointer",border:"none"}}>
            ←
          </button>
          <button onClick={()=>{if(running){clearTimer();setRunning(false);}else setRunning(true);}}
            style={{flex:1,padding:"14px",borderRadius:"13px",background:meta.color,
              color:"#000",fontSize:"16px",fontWeight:"700",cursor:"pointer",border:"none"}}>
            {running ? "Pause" : sec === 0 ? "Start" : "Resume"}
          </button>
          <button onClick={next} style={{padding:"14px 18px",borderRadius:"13px",
            background:"#2c2c2e",color:"#8e8e93",fontSize:"16px",fontWeight:"600",cursor:"pointer",border:"none"}}>
            →
          </button>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
          <div style={{flex:1,height:"3px",background:"rgba(255,255,255,0.1)",borderRadius:"2px"}}>
            <div style={{height:"100%",borderRadius:"2px",background:meta.color,
              width:`${pct}%`,transition:"width 0.4s"}}/>
          </div>
          <span style={{fontSize:"12px",color:"#636366",whiteSpace:"nowrap"}}>
            {em}:{String(es).padStart(2,"0")} / 20:00
          </span>
        </div>
      </div>
    </div>
  );
}

// ── Full Body view ────────────────────────────────────────────────────────────
function FBView({weights, onSave, onDelete}) {
  const color = "#32d74b";
  const [mode, setMode] = useState("list");
  const [editTarget, setEditTarget] = useState(null);
  const [addSection, setAddSection] = useState(null);
  const [overrides, setOverrides] = useState(() => store.get("fb-overrides"));
  const [customs, setCustoms] = useState(() => store.get("fb-customs", []));

  const saveOverride = (name, patch) => {
    const o = {...overrides, [name]: patch};
    setOverrides(o); store.set("fb-overrides", o);
  };
  const addCustom = (section, data) => {
    const items = Array.isArray(data) ? data : [data];
    const c = [...customs, ...items.map(x => ({...x, id: uid(), section}))];
    setCustoms(c); store.set("fb-customs", c);
  };
  const editCustom = (id, data) => {
    const c = customs.map(x => x.id === id ? {...x, ...data} : x);
    setCustoms(c); store.set("fb-customs", c);
  };
  const removeCustom = id => {
    const c = customs.filter(x => x.id !== id);
    setCustoms(c); store.set("fb-customs", c);
  };
  const resolve = ex => ({...ex, ...overrides[ex.name]});
  const allFlat = FB_SECTIONS.flatMap(s => {
    const base = s.exercises.map(e => resolve({...e, section: s.section}));
    const cust = customs.filter(c => c.section === s.section);
    return [...base, ...cust];
  });

  if (mode === "session") return (
    <Session exercises={allFlat} color={color} weights={weights} onSave={onSave} onExit={()=>setMode("list")}/>
  );

  let idx = 0;
  return (
    <div>
      <div style={{padding:"18px 18px 10px",display:"flex",alignItems:"center",
        justifyContent:"space-between",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
        <div>
          <h1 style={{fontSize:"22px",fontWeight:"700"}}>Full Body</h1>
          <p style={{fontSize:"14px",color:"#636366",marginTop:"3px"}}>0–2 RIR · 27 sets · ~75 min</p>
        </div>
        <div style={{display:"flex",gap:"8px"}}>
          <button onClick={onDelete} style={{
            background:"rgba(255,69,58,0.12)",color:"#ff453a",border:"1px solid rgba(255,69,58,0.35)",
            borderRadius:"10px",padding:"10px 12px",fontSize:"13px",fontWeight:"700",cursor:"pointer",
          }}>
            Delete
          </button>
          <button onClick={()=>setMode("session")} style={{padding:"11px 18px",borderRadius:"12px",
            background:color,color:"#000",fontSize:"15px",fontWeight:"700",cursor:"pointer",border:"none"}}>
            Start
          </button>
        </div>
      </div>
      <div style={{padding:"0 14px 20px"}}>
        {FB_SECTIONS.map(sec => (
          <div key={sec.section}>
            <div style={{fontSize:"12px",fontWeight:"600",color:"#636366",
              textTransform:"uppercase",letterSpacing:"0.07em",padding:"18px 4px 10px"}}>
              {sec.section}
            </div>
            {sec.exercises.map(ex => {
              const resolved = resolve(ex);
              return <ExCard key={ex.name} ex={resolved} idx={idx++} color={color}
                weights={weights} onSave={onSave} isCustom={false}
                onEdit={()=>setEditTarget({ex:resolved, origName:ex.name, isCustom:false})}/>;
            })}
            {customs.filter(c => c.section === sec.section).map(cx => (
              <ExCard key={cx.id} ex={cx} idx={idx++} color={color}
                weights={weights} onSave={onSave} isCustom={true}
                onEdit={()=>setEditTarget({ex:cx, isCustom:true})}/>
            ))}
            <AddExBtn color={color} onClick={()=>setAddSection(sec.section)}/>
          </div>
        ))}
      </div>

      {editTarget && (
        <EditModal ex={editTarget.ex}
          onSave={data => {
            if (editTarget.isCustom) editCustom(editTarget.ex.id, data);
            else saveOverride(editTarget.origName, data);
            setEditTarget(null);
          }}
          onDelete={editTarget.isCustom ? () => { removeCustom(editTarget.ex.id); setEditTarget(null); } : null}
          onClose={()=>setEditTarget(null)}
        />
      )}
      {addSection && (
        <BulkExerciseModal color={color}
          onSave={items=>{ addCustom(addSection, items); setAddSection(null); }}
          onClose={()=>setAddSection(null)}
        />
      )}
    </div>
  );
}

          <div style={{fontSize:"13px",fontWeight:"600",color:meta.color}}>{pd?.dur}</div>
          <div style={{fontSize:"12px",color:"#636366",marginTop:"2px"}}>{stretch.isDynamic ? "Dynamic" : "Static"}</div>
        </div>
      </div>
      {open && (
        <div style={{padding:"12px 14px 16px",borderTop:"1px solid rgba(255,255,255,0.07)",
          fontSize:"14px",color:"#8e8e93",lineHeight:"1.65",background:"#111"}}>
          {pd?.how}
        </div>
      )}
    </div>
  );
}

// ── Stretch view ──────────────────────────────────────────────────────────────
function StretchView({onDelete}) {
  const [phase, setPhase] = useState(1);
  const [mode, setMode] = useState("list");
  const meta = SPHASE[phase];

  if (mode === "timer") return <StretchTimer phase={phase} onExit={()=>setMode("list")}/>;

  return (
    <div>
      <div style={{padding:"18px 18px 0",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
        <div style={{display:"flex",gap:"6px",marginBottom:"14px"}}>
          {[1,2,3,4,5].map(p => {
            const pm = SPHASE[p], active = phase === p;
            return (
              <button key={p} onClick={()=>setPhase(p)} style={{
                flex:1,padding:"10px 2px",borderRadius:"10px",
                border:active?`1.5px solid ${pm.color}`:"1px solid rgba(255,255,255,0.1)",
                background:active?`${pm.color}18`:"#1c1c1e",
                color:active?pm.color:"#636366",
                fontSize:"12px",fontWeight:"700",cursor:"pointer",lineHeight:"1.4",
              }}>
                P{p}<br/>
                <span style={{fontSize:"10px",fontWeight:"400",opacity:0.8}}>{pm.name.split(" ")[0]}</span>
              </button>
            );
          })}
        </div>
        <div style={{background:"#1c1c1e",borderRadius:"12px",padding:"12px 14px",marginBottom:"14px"}}>
          <p style={{fontSize:"13px",fontWeight:"700",color:meta.color,marginBottom:"4px"}}>{meta.name} — {meta.months}</p>
          <p style={{fontSize:"13px",color:"#8e8e93",lineHeight:"1.6"}}>{meta.desc}</p>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:"10px",marginBottom:"14px"}}>
          <p style={{fontSize:"14px",color:"#636366"}}>13 stretches · 20 minutes</p>
          <div style={{display:"flex",gap:"8px"}}>
            <button onClick={onDelete} style={{
              background:"rgba(255,69,58,0.12)",color:"#ff453a",border:"1px solid rgba(255,69,58,0.35)",
              borderRadius:"10px",padding:"9px 11px",fontSize:"13px",fontWeight:"700",cursor:"pointer",
            }}>
              Delete
            </button>
            <button onClick={()=>setMode("timer")} style={{padding:"10px 18px",borderRadius:"11px",
              background:meta.color,color:"#000",fontSize:"14px",fontWeight:"700",cursor:"pointer",border:"none"}}>
              Start
            </button>
          </div>
        </div>
      </div>
      <div style={{padding:"8px 14px 20px"}}>
        {STRETCHES.map((s,i) => (
          <StretchListCard key={s.name} stretch={s} idx={i} phase={phase} meta={meta}/>
        ))}
      </div>
    </div>
  );
}

// ── Home / custom split builder ───────────────────────────────────────────────
function SplitBuilder({onSave, onClose}) {
  const [name, setName] = useState("");
  const [color, setColor] = useState("#ff9f0a");
  const [phaseCount, setPhaseCount] = useState("1");
  const [sessionCount, setSessionCount] = useState("1");
  const palette = ["#ff9f0a","#32d74b","#0a84ff","#bf5af2","#ff375f","#64d2ff"];

  const makeSplit = () => {
    const pCount = Math.max(1, Math.min(12, parseInt(phaseCount) || 1));
    const sCount = Math.max(1, Math.min(12, parseInt(sessionCount) || 1));
    const safePhases = Array.from({length:pCount}, (_,i) => `Phase ${i + 1}`);
    const safeSessions = Array.from({length:sCount}, (_,i) => `Session ${i + 1}`);
    onSave({
      id: uid(),
      label: name.trim() || "New Split",
      color,
      phases: safePhases.map((p, pi) => ({
        id: uid(),
        label: p,
        name: p,
        sessions: safeSessions.map((s, si) => ({
          id: uid(),
          label: s,
          day: s,
          exercises: [],
        })),
      })),
    });
  };

  return (
    <div className="modal-bg" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal-body">
        <div className="drag-bar"/>
        <h2 style={{fontSize:"20px",fontWeight:"700",marginBottom:"4px"}}>Add split</h2>
        <p style={{fontSize:"14px",color:"#636366",marginBottom:"24px"}}>Set up the shell now, then add exercises inside it.</p>

        <div className="row">
          <span className="field-label">Split name</span>
          <input className="field" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Upper / Lower"/>
        </div>
        <div className="row">
          <span className="field-label">Colour</span>
          <div style={{display:"flex",gap:"10px",flexWrap:"wrap"}}>
            {palette.map(c => (
              <button key={c} onClick={()=>setColor(c)} style={{
                width:"34px",height:"34px",borderRadius:"50%",background:c,cursor:"pointer",
                border:color===c?"3px solid #fff":"3px solid rgba(255,255,255,0.12)",
              }}/>
            ))}
          </div>
        </div>
        <div style={{display:"flex",gap:"12px",marginBottom:"18px"}}>
          <div style={{flex:1}}>
            <span className="field-label">Phases</span>
            <input className="field" type="number" min="1" max="12" value={phaseCount} onChange={e=>setPhaseCount(e.target.value)}/>
          </div>
          <div style={{flex:1}}>
            <span className="field-label">Sessions each</span>
            <input className="field" type="number" min="1" max="12" value={sessionCount} onChange={e=>setSessionCount(e.target.value)}/>
          </div>
        </div>

        <button onClick={makeSplit} style={{width:"100%",padding:"16px",borderRadius:"13px",
          background:color,color:"#000",fontSize:"17px",fontWeight:"700",cursor:"pointer",marginBottom:"10px"}}>
          Create split
        </button>
        <button onClick={onClose} style={{width:"100%",padding:"14px",borderRadius:"13px",
          background:"rgba(255,255,255,0.07)",color:"#8e8e93",fontSize:"16px",cursor:"pointer"}}>
          Cancel
        </button>
      </div>
    </div>
  );
}

function HomeView({username, setUsername, tabs, customSplits, onOpen, onAddSplit, onDeleteSplit, canAddSplit, maxCustomSplits}) {
  const [editingName, setEditingName] = useState(!username);
  const [draftName, setDraftName] = useState(username);
  useEffect(() => setDraftName(username), [username]);
  const commitName = () => { setUsername(draftName.trim()); setEditingName(false); };

  return (
    <div>
      <div style={{padding:"22px 18px 16px",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
        <p style={{fontSize:"13px",fontWeight:"700",color:"#8e8e93",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"8px"}}>
          Workout
        </p>
        {editingName ? (
          <input className="field" value={draftName} autoFocus
            onChange={e=>setDraftName(e.target.value)}
            onBlur={commitName}
            onKeyDown={e=>{ if(e.key==="Enter") commitName(); if(e.key==="Escape") setEditingName(false); }}
            placeholder="Enter your username"/>
        ) : (
          <button onClick={()=>setEditingName(true)} style={{
            display:"block",background:"none",border:"none",padding:0,cursor:"pointer",
            color:"#fff",textAlign:"left",
          }}>
            <h1 style={{fontSize:"28px",fontWeight:"800",lineHeight:"1.15"}}>
              Hi{username ? `, ${username}` : ""}.
            </h1>
            <span style={{display:"block",fontSize:"13px",color:"#636366",marginTop:"6px"}}>Tap name to edit</span>
          </button>
        )}
      </div>
      <div style={{padding:"16px 14px 24px"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
          {tabs.filter(t => t.id !== "home").map(({id,label,color,Icon}) => (
            <button key={id} onClick={()=>onOpen(id)} style={{
              minHeight:"116px",borderRadius:"14px",background:"#1c1c1e",
              border:`1px solid ${color}45`,padding:"14px",textAlign:"left",cursor:"pointer",
              color:"#fff",display:"flex",flexDirection:"column",justifyContent:"space-between",
              position:"relative",
            }}>
              <span onClick={e=>{e.stopPropagation();onDeleteSplit(id);}} style={{
                position:"absolute",top:"10px",right:"10px",width:"26px",height:"26px",
                borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
                color:"#ff453a",background:"rgba(255,69,58,0.12)",fontSize:"16px",fontWeight:"700",
              }}>×</span>
              <Icon size={24} color={color}/>
              <span style={{fontSize:"17px",fontWeight:"700"}}>{label}</span>
            </button>
          ))}
          {customSplits.map(s => (
            <button key={s.id} onClick={()=>onOpen(s.id)} style={{
              minHeight:"116px",borderRadius:"14px",background:"#1c1c1e",
              border:`1px solid ${s.color}45`,padding:"14px",textAlign:"left",cursor:"pointer",
              color:"#fff",display:"flex",flexDirection:"column",justifyContent:"space-between",
              position:"relative",
            }}>
              <span onClick={e=>{e.stopPropagation();onDeleteSplit(s.id);}} style={{
                position:"absolute",top:"10px",right:"10px",width:"26px",height:"26px",
                borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
                color:"#ff453a",background:"rgba(255,69,58,0.12)",fontSize:"16px",fontWeight:"700",
              }}>×</span>
              <DumbbellIcon size={24} color={s.color}/>
              <span style={{fontSize:"17px",fontWeight:"700"}}>{s.label}</span>
            </button>
          ))}
          <button onClick={onAddSplit} disabled={!canAddSplit} style={{
            minHeight:"116px",borderRadius:"14px",background:"rgba(255,255,255,0.04)",
            border:"1px dashed rgba(255,255,255,0.22)",padding:"14px",textAlign:"left",
            color:canAddSplit?"#8e8e93":"#3a3a3c",cursor:canAddSplit?"pointer":"default",
            display:"flex",flexDirection:"column",justifyContent:"space-between",
          }}>
            <PlusIcon size={24} color={canAddSplit ? "#8e8e93" : "#3a3a3c"}/>
            <span style={{fontSize:"17px",fontWeight:"700"}}>{canAddSplit ? "Add split" : `Max ${maxCustomSplits} splits`}</span>
          </button>
        </div>
      </div>
    </div>
  );
}

function CustomSplitView({split, onUpdate, onDelete, weights, onSave}) {
  const [phaseId, setPhaseId] = useState(split.phases[0]?.id);
  const phase = split.phases.find(p => p.id === phaseId) || split.phases[0];
  const [sessionId, setSessionId] = useState(phase?.sessions[0]?.id);
  const session = phase?.sessions.find(s => s.id === sessionId) || phase?.sessions[0];
  const [mode, setMode] = useState("list");
  const [editTarget, setEditTarget] = useState(null);
  const [adding, setAdding] = useState(false);
  const [countTarget, setCountTarget] = useState(null);

  useEffect(() => {
    const nextPhase = split.phases.find(p => p.id === phaseId) || split.phases[0];
    if (nextPhase && !nextPhase.sessions.find(s => s.id === sessionId)) {
      setSessionId(nextPhase.sessions[0]?.id);
    }
  }, [phaseId, split]);

  if (!phase || !session) return null;
  const color = split.color;
  const updateSession = updater => {
    const updated = {
      ...split,
      phases: split.phases.map(p => p.id !== phase.id ? p : {
        ...p,
        sessions: p.sessions.map(s => s.id !== session.id ? s : updater(s)),
      }),
    };
    onUpdate(updated);
  };
  const addExercise = data => {
    const items = Array.isArray(data) ? data : [data];
    updateSession(s => ({...s, exercises:[...s.exercises,...items.map(x => ({...x,id:uid()}))]}));
  };
  const editExercise = (id, data) => updateSession(s => ({...s, exercises:s.exercises.map(e => e.id === id ? {...e,...data} : e)}));
  const removeExercise = id => updateSession(s => ({...s, exercises:s.exercises.filter(e => e.id !== id)}));
  const addPhase = count => {
    const additions = Array.from({length:count}, (_,i) => {
      const n = split.phases.length + i + 1;
      return {id:uid(),label:`Phase ${n}`,name:`Phase ${n}`,
        sessions:[{id:uid(),label:"Session 1",day:"Session 1",exercises:[]}]};
    });
    onUpdate({...split, phases:[...split.phases, ...additions]});
    setPhaseId(additions[0].id); setSessionId(additions[0].sessions[0].id);
  };
  const addSession = count => {
    const additions = Array.from({length:count}, (_,i) => {
      const n = phase.sessions.length + i + 1;
      return {id:uid(),label:`Session ${n}`,day:`Session ${n}`,exercises:[]};
    });
    onUpdate({...split, phases:split.phases.map(p => p.id === phase.id ? {...p, sessions:[...p.sessions, ...additions]} : p)});
    setSessionId(additions[0].id);
  };

  if (mode === "session") return (
    <Session exercises={session.exercises} color={color} weights={weights} onSave={onSave} onExit={()=>setMode("list")}/>
  );

  return (
    <div>
      <div style={{padding:"18px 18px 0",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"12px",marginBottom:"12px"}}>
          <h1 style={{fontSize:"22px",fontWeight:"700"}}>{split.label}</h1>
          <button onClick={onDelete} style={{
            background:"rgba(255,69,58,0.12)",color:"#ff453a",border:"1px solid rgba(255,69,58,0.35)",
            borderRadius:"9px",padding:"7px 10px",fontSize:"13px",fontWeight:"700",cursor:"pointer",
          }}>
            Delete
          </button>
        </div>
        <div style={{display:"flex",gap:"8px",marginBottom:"12px",overflowX:"auto"}}>
          {split.phases.map(p => (
            <button key={p.id} onClick={()=>setPhaseId(p.id)} style={{
              minWidth:"92px",padding:"10px 8px",borderRadius:"12px",
              border:phase.id===p.id?`1.5px solid ${color}`:"1px solid rgba(255,255,255,0.1)",
              background:phase.id===p.id?`${color}18`:"#1c1c1e",
              color:phase.id===p.id?color:"#636366",fontSize:"13px",fontWeight:"700",cursor:"pointer",
            }}>{p.label}</button>
          ))}
          <button onClick={()=>setCountTarget("phase")} style={{minWidth:"44px",borderRadius:"12px",background:`${color}14`,
            color:color,border:`1px solid ${color}55`,fontSize:"20px",fontWeight:"700",cursor:"pointer"}}>+</button>
        </div>
        <div style={{display:"flex",gap:"8px",marginBottom:"14px",overflowX:"auto"}}>
          {phase.sessions.map(s => (
            <button key={s.id} onClick={()=>setSessionId(s.id)} style={{
              minWidth:"110px",padding:"11px 12px",borderRadius:"12px",textAlign:"left",
              border:session.id===s.id?`1.5px solid ${color}`:"1px solid rgba(255,255,255,0.1)",
              background:session.id===s.id?`${color}18`:"#1c1c1e",
              color:session.id===s.id?color:"#8e8e93",fontSize:"14px",fontWeight:"700",cursor:"pointer",
            }}>{s.label}</button>
          ))}
          <button onClick={()=>setCountTarget("session")} style={{minWidth:"44px",borderRadius:"12px",background:`${color}14`,
            color:color,border:`1px solid ${color}55`,fontSize:"20px",fontWeight:"700",cursor:"pointer"}}>+</button>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
          <span style={{fontSize:"14px",color:"#636366"}}>{session.exercises.length} exercises</span>
          <button onClick={()=>setMode("session")} disabled={!session.exercises.length} style={{padding:"10px 22px",borderRadius:"11px",
            background:session.exercises.length?color:"#2c2c2e",color:session.exercises.length?"#000":"#636366",
            fontSize:"14px",fontWeight:"700",cursor:session.exercises.length?"pointer":"default",border:"none"}}>
            Start
          </button>
        </div>
      </div>
      <div style={{padding:"8px 14px 20px"}}>
        {session.exercises.map((ex,i) => (
          <ExCard key={ex.id} ex={ex} idx={i} color={color} weights={weights} onSave={onSave}
            isCustom={true} onEdit={()=>setEditTarget(ex)}/>
        ))}
        <AddExBtn color={color} onClick={()=>setAdding(true)}/>
      </div>
      {editTarget && (
        <EditModal ex={editTarget}
          onSave={data=>{ editExercise(editTarget.id,data); setEditTarget(null); }}
          onDelete={()=>{ removeExercise(editTarget.id); setEditTarget(null); }}
          onClose={()=>setEditTarget(null)}
        />
      )}
      {adding && (
        <BulkExerciseModal color={color}
          onSave={items=>{ addExercise(items); setAdding(false); }}
          onClose={()=>setAdding(false)}
        />
      )}
      {countTarget && (
        <CountModal
          title={countTarget === "phase" ? "Add phases" : "Add sessions"}
          label={countTarget === "phase" ? "Number of phases" : "Number of sessions"}
          color={color}
          onSave={n=>{ countTarget === "phase" ? addPhase(n) : addSession(n); setCountTarget(null); }}
          onClose={()=>setCountTarget(null)}
        />
      )}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const MAX_CUSTOM_SPLITS = 4;
  const [tab, setTab] = useState("home");
  const [weights, setWeights] = useState(() => store.get("weights"));
  const [username, setUsernameState] = useState(() => store.get("username", ""));
  const [customSplits, setCustomSplits] = useState(() => store.get("custom-splits", []));
  const [hiddenTabs, setHiddenTabs] = useState(() => store.get("hidden-tabs", []));
  const [buildingSplit, setBuildingSplit] = useState(false);
  const save = (k, v) => { const u = {...weights, [k]: v}; setWeights(u); store.set("weights", u); };
  const setUsername = v => { setUsernameState(v); store.set("username", v); };
  const saveSplits = splits => { setCustomSplits(splits); store.set("custom-splits", splits); };
  const saveHiddenTabs = ids => { setHiddenTabs(ids); store.set("hidden-tabs", ids); };
  const addSplit = split => {
    if (customSplits.length >= MAX_CUSTOM_SPLITS) { setBuildingSplit(false); return; }
    const next = [...customSplits, split]; saveSplits(next); setBuildingSplit(false); setTab(split.id);
  };
  const updateSplit = split => saveSplits(customSplits.map(s => s.id === split.id ? split : s));
  const deleteSplit = id => {
    if (!window.confirm("Delete this split?")) return;
    if (["fb","ten","str"].includes(id)) {
      saveHiddenTabs([...new Set([...hiddenTabs, id])]);
    } else {
      saveSplits(customSplits.filter(s => s.id !== id));
    }
    if (tab === id) setTab("home");
  };

  const tabs = [
    {id:"home",label:"Home",      color:"#8e8e93", Icon:HomeIcon},
    {id:"fb",  label:"Full Body", color:"#32d74b", Icon:DumbbellIcon},
    {id:"ten", label:"Tendon",    color:"#ff453a", Icon:BoltIcon},
    {id:"str", label:"Stretch",   color:"#0a84ff", Icon:PersonIcon},
  ];
  const visibleTabs = tabs.filter(t => t.id === "home" || !hiddenTabs.includes(t.id));
  const allTabs = [
    ...visibleTabs,
    ...customSplits.map(s => ({id:s.id,label:s.label,color:s.color,Icon:DumbbellIcon})),
  ];
  const activeSplit = customSplits.find(s => s.id === tab);
  const navCount = allTabs.length;
  const navIconSize = navCount > 6 ? 18 : navCount > 4 ? 20 : 22;
  const navFontSize = navCount > 6 ? "8px" : "10px";
  const navMinWidth = navCount > 6 ? "48px" : "0";

  return (
    <div style={{background:"#111",minHeight:"100dvh",color:"#fff",maxWidth:"430px",margin:"0 auto"}}>
      <div style={{paddingBottom:"calc(60px + env(safe-area-inset-bottom))"}}>
        {tab === "home" && <HomeView username={username} setUsername={setUsername}
          tabs={visibleTabs} customSplits={customSplits} onOpen={setTab}
          onAddSplit={()=>{ if (customSplits.length < MAX_CUSTOM_SPLITS) setBuildingSplit(true); }}
          onDeleteSplit={deleteSplit} canAddSplit={customSplits.length < MAX_CUSTOM_SPLITS}
          maxCustomSplits={MAX_CUSTOM_SPLITS}/>}
        {tab === "fb"  && !hiddenTabs.includes("fb")  && <FBView     weights={weights} onSave={save} onDelete={()=>deleteSplit("fb")}/>}
        {tab === "ten" && !hiddenTabs.includes("ten") && <TendonView weights={weights} onSave={save} onDelete={()=>deleteSplit("ten")}/>}
        {tab === "str" && !hiddenTabs.includes("str") && <StretchView onDelete={()=>deleteSplit("str")}/>}
        {activeSplit && <CustomSplitView split={activeSplit} onUpdate={updateSplit}
          onDelete={()=>deleteSplit(activeSplit.id)} weights={weights} onSave={save}/>}
      </div>

      <nav style={{
        position:"fixed",bottom:0,left:0,right:0,
        maxWidth:"430px",margin:"0 auto",
        background:"rgba(28,28,30,0.96)",
        borderTop:"0.5px solid rgba(255,255,255,0.14)",
        backdropFilter:"blur(20px)",
        WebkitBackdropFilter:"blur(20px)",
        paddingBottom:"env(safe-area-inset-bottom)",
        display:"flex",overflowX:"auto",zIndex:30,
      }}>
        {allTabs.map(({id, label, color, Icon}) => {
          const active = tab === id;
          return (
            <button key={id} onClick={()=>setTab(id)} style={{
              flex:"1 1 0",minWidth:navMinWidth,
              display:"flex",flexDirection:"column",
              alignItems:"center",gap:"4px",
              padding:navCount > 6 ? "8px 0 7px" : "10px 0 8px",
              background:"none",cursor:"pointer",border:"none",
              color: active ? color : "#636366",
            }}>
              <Icon size={navIconSize} color={active ? color : "#636366"}/>
              <span style={{fontSize:navFontSize,fontWeight:active?"600":"400",letterSpacing:"0.01em",
                maxWidth:"100%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                {label}
              </span>
            </button>
          );
        })}
      </nav>
      {buildingSplit && <SplitBuilder onSave={addSplit} onClose={()=>setBuildingSplit(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
