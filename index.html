  <style>
    /* CSS Custom Properties for Theme Engine */
    :root[data-theme="dark"] {
      --bg: #121214;
      --card-bg: #1c1c1e;
      --card-border: rgba(255, 255, 255, 0.07);
      --text: #ffffff;
      --text-secondary: #8e8e93;
      --accent: #bf5af2;
      --accent-muted: rgba(191, 90, 242, 0.15);
      --accent-rgb: 191, 90, 242;
      --success: #30d158;
      --success-muted: rgba(48, 209, 88, 0.15);
      --warning: #ff9f0a;
      --warning-muted: rgba(255, 159, 10, 0.15);
      --danger: #ff453a;
      --danger-muted: rgba(255, 69, 58, 0.15);
      --header-bg: #1c1c1e;
      --btn-text: #ffffff;
      --input-bg: rgba(255, 255, 255, 0.05);
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      --border-thickness: 1px;
    }

    :root[data-theme="light"] {
      --bg: #f5f5f7;
      --card-bg: #ffffff;
      --card-border: rgba(0, 0, 0, 0.06);
      --text: #1c1c1e;
      --text-secondary: #8e8e93;
      --accent: #af52de;
      --accent-muted: rgba(175, 82, 222, 0.1);
      --accent-rgb: 175, 82, 222;
      --success: #34c759;
      --success-muted: rgba(52, 199, 89, 0.1);
      --warning: #ff9500;
      --warning-muted: rgba(255, 149, 0, 0.1);
      --danger: #ff3b30;
      --danger-muted: rgba(255, 59, 48, 0.1);
      --header-bg: #ffffff;
      --btn-text: #ffffff;
      --input-bg: rgba(0, 0, 0, 0.03);
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
      --border-thickness: 1px;
    }

    /* Nocturnal Anti-Red High-Contrast Theme (Perfect for heavy red-tinted night overlays) */
    :root[data-theme="anti-red"] {
      --bg: #000000;
      --card-bg: #0c0c0c;
      --card-border: #ffd700;
      --text: #ffd700;
      --text-secondary: #e5c158;
      --accent: #ffd700;
      --accent-muted: rgba(255, 215, 0, 0.15);
      --accent-rgb: 255, 215, 0;
      --success: #ffd700;
      --success-muted: rgba(255, 215, 0, 0.1);
      --warning: #ffd700;
      --warning-muted: rgba(255, 215, 0, 0.1);
      --danger: #ffd700;
      --danger-muted: rgba(255, 215, 0, 0.1);
      --header-bg: #0c0c0c;
      --btn-text: #000000;
      --input-bg: rgba(255, 215, 0, 0.05);

      --border-thickness: 1.5px;

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      -webkit-text-size-adjust: 100%;
      transition: background 0.25s, color 0.25s;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      padding-bottom: calc(85px + env(safe-area-inset-bottom)); /* Dynamic bottom bar spacing */
    }

    /* Scrollbars hiding */
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    button {
      font-family: inherit;
      border: none;
      outline: none;
      background: none;
      cursor: pointer;
      color: inherit;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active {
      opacity: 0.7;
      transform: scale(0.98);
    }

    /* Global Layout & Containers */
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px;

    .card {

      border: var(--border-thickness) solid var(--card-border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      transition: all 0.2s ease;

    /* Modal Layouts */
    .modal-bg {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: flex-end;
      justify-content: center;

    @keyframes fadeIn {

      to { opacity: 1; }

    /* Contribution Grid & Monthly Calendar */

    .chart-container {
      position: relative;
      width: 100%;
      height: 180px;
      background: var(--input-bg);
      border: var(--border-thickness) solid var(--card-border);

    /* Utility helpers */
    .text-success { color: var(--success) !important; }
    .text-warning { color: var(--warning) !important; }
    .text-danger { color: var(--danger) !important; }

    .text-small { font-size: 13px; color: var(--text-secondary); }

    .flex-row { display: flex; align-items: center; gap: 8px; }

  <!-- React Code Implementation inside Babel -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Helper utilities
    const parseRestSec = r => {
      if (!r) return 90;
      const m = r.match(/(\d+(?:\.\d+)?)\s*min/);
      if (m) return Math.round(parseFloat(m[1]) * 60);
      const s = r.match(/(\d+)s/);
      if (s) return parseInt(s[1]);
      return 90;
    };
    const fmtTime = s => s <= 0 ? "0:00" : `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
    const uid = () => Math.random().toString(36).slice(2, 9);
    
    const store = {
      get: (k, d = {}) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } },
      set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
    };

    // Native Synth Alarms using Web Audio API (No files, works offline, highly customisable)
    const playSynthTone = (freqs, duration, type = 'sine', volume = 0.1) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        freqs.forEach((freq, idx) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          
          osc.type = type;
          osc.frequency.setValueAtTime(freq, ctx.currentTime);
          
          // Exponential decay for clean chime sounds
          gain.gain.setValueAtTime(volume, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
          
          osc.start(ctx.currentTime + (idx * 0.1)); // slight delay to form a sequential chord chime
          osc.stop(ctx.currentTime + duration + (idx * 0.1));
        });
      } catch (e) {
        console.warn("Web Audio Context not loaded or restricted.", e);
      }
    };

    const triggerSound = (type) => {
      if (type === 'tick') {
        // Simple low frequency woodblock-like click
        playSynthTone([440], 0.05, 'triangle', 0.15);
      } else if (type === 'chime') {
        // High frequency pleasant major triad chord chord (C5 - E5 - G5)
        playSynthTone([523.25, 659.25, 783.99], 0.6, 'sine', 0.2);
      } else if (type === 'rest-chime') {
        // Rising upbeat sound (G4 -> C5)
        playSynthTone([392.00, 523.25], 0.4, 'sine', 0.15);
      } else if (type === 'beep-high') {
        playSynthTone([880], 0.12, 'sine', 0.2);
      }
    };

    // Sound Test Settings Controller
    function SoundConfigCard() {
      return (
        <div className="card">
          <div className="flex-between" style={{marginBottom: "12px"}}>
            <div>
              <p className="font-bold">Sound Synthesizer</p>
              <p className="text-small">Built-in synthetic audio alerts (100% Offline)</p>
            </div>
            <div style={{display: "flex", gap: "6px"}}>
              <button className="button-secondary" style={{padding: "6px 12px", fontSize: "12px", width: "auto"}} onClick={() => triggerSound('tick')}>Tick</button>
              <button className="button-secondary" style={{padding: "6px 12px", fontSize: "12px", width: "auto"}} onClick={() => triggerSound('rest-chime')}>Rest</button>
              <button className="button-secondary" style={{padding: "6px 12px", fontSize: "12px", width: "auto"}} onClick={() => triggerSound('chime')}>Alarm</button>
            </div>
          </div>
        </div>
      );
    }

    // Wake Lock Controller (Prevents screen sleep during holds/stretches)
    function WakeLockToggle() {
      const [locked, setLocked] = useState(false);
      const wakeLockRef = useRef(null);

      const requestLock = async () => {
        try {
          if ('wakeLock' in navigator) {
            wakeLockRef.current = await navigator.wakeLock.request('screen');
            setLocked(true);
            wakeLockRef.current.addEventListener('release', () => setLocked(false));
          } else {
            alert("Wake Lock is not supported on this browser.");
          }
        } catch (e) {
          console.warn("Screen Wake Lock request failed.", e);
        }
      };

      const releaseLock = async () => {
        if (wakeLockRef.current) {
          await wakeLockRef.current.release();
          wakeLockRef.current = null;
          setLocked(false);
        }
      };

      useEffect(() => {
        return () => { if (wakeLockRef.current) wakeLockRef.current.release(); };
      }, []);

      return (
        <div className="card">
          <div className="flex-between">
            <div>
              <p className="font-bold">Screen Wake Lock</p>
              <p className="text-small">Keep screen alive during hold and stretch timers</p>
            </div>
            <button 
              onClick={locked ? releaseLock : requestLock}
              style={{
                background: locked ? "var(--success-muted)" : "var(--input-bg)",
                border: locked ? "1.5px solid var(--success)" : "var(--border-thickness) solid var(--card-border)",
                borderRadius: "20px", padding: "6px 16px", fontSize: "13px", fontWeight: "700",
                color: locked ? "var(--success)" : "var(--text)"
              }}
            >
              {locked ? "🔒 Active" : "🔓 Off"}
            </button>
          </div>
        </div>
      );
    }

        {name:"Back Row",equip:"Machine",sets:1,reps:"5-8",weight:"",rest:"2 min",

        {name:"Low Row",equip:"Cable Single",sets:1,reps:"5-8",weight:"",rest:"90s",

        {name:"Reverse Fly",equip:"Machine",sets:1,reps:"5-8",weight:"",rest:"75s",

      {section:"Legs",exercises:[

    // Elegant Weight selector/chip with local state preservation
    function WeightChip({exKey, defaultWeight, color, weights, onSave}) {
      const [editing, setEditing] = useState(false);
      const ref = useRef(null);
      const stored = weights[exKey];
      const val = stored !== undefined ? stored : (defaultWeight || "");
      const [draft, setDraft] = useState(val);

      const startEdit = e => {
        e.stopPropagation();
        setDraft(val);
        setEditing(true);
        setTimeout(() => { if (ref.current) { ref.current.focus(); ref.current.select(); } }, 50);
      };
      
      const commit = () => {
        onSave(exKey, draft.trim());
        setEditing(false);
      };

      if (editing) {
        return (
          <input
            ref={ref}
            value={draft}
            onChange={e => setDraft(e.target.value)}
            onBlur={commit}
            onKeyDown={e => {
              if (e.key === "Enter") commit();
              if (e.key === "Escape") setEditing(false);
            }}
            onClick={e => e.stopPropagation()}

    // Canvas-based Progression Line Chart Component (Self-Contained & Responsive)
    function ProgressionChart({data, selectedExercise}) {
      const canvasRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current || !data || data.length < 2) return;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        
        // Handle High-DPI screens
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * 2;
        canvas.height = rect.height * 2;
        ctx.scale(2, 2);

        const width = rect.width;
        const height = rect.height;
        const padding = 35;

        // Parse weights to numbers for charting
        const parseW = str => {
          if (!str) return 0;
          const num = parseFloat(str.replace(/[^\d.]/g, ''));
          return isNaN(num) ? 0 : num;
        };

        const points = data.map(d => ({
          date: new Date(d.date),
          weight: parseW(d.weight),
          label: d.weight || "0"
        })).sort((a,b) => a.date - b.date);

        const weights = points.map(p => p.weight);
        const minW = Math.min(...weights) * 0.9;
        const maxW = Math.max(...weights) * 1.1 || 10;
        const rangeW = maxW - minW || 10;

        ctx.clearRect(0, 0, width, height);

        // Chart styling based on theme
        const isAntiRed = document.documentElement.getAttribute('data-theme') === 'anti-red';
        const strokeColor = isAntiRed ? '#ffd700' : '#bf5af2';
        const gridColor = isAntiRed ? 'rgba(255, 215, 0, 0.15)' : 'rgba(255, 255, 255, 0.08)';
        const textColor = isAntiRed ? '#ffd700' : '#8e8e93';

        // Draw horizontal grid lines
        ctx.strokeStyle = gridColor;
        ctx.lineWidth = 1;
        ctx.fillStyle = textColor;
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'right';

        for (let i = 0; i <= 3; i++) {
          const y = padding + (height - padding * 2) * (i / 3);
          const wVal = maxW - rangeW * (i / 3);
          
          ctx.beginPath();
          ctx.moveTo(padding, y);
          ctx.lineTo(width - 15, y);
          ctx.stroke();
          
          ctx.fillText(`${wVal.toFixed(1)}kg`, padding - 6, y + 3);
        }

        // Plot points & lines
        const getX = idx => padding + (width - padding - 20) * (idx / (points.length - 1));
        const getY = val => height - padding - (height - padding * 2) * ((val - minW) / rangeW);

        ctx.strokeStyle = strokeColor;
        ctx.lineWidth = 2.5;
        ctx.beginPath();

        points.forEach((p, idx) => {
          const x = getX(idx);
          const y = getY(p.weight);
          if (idx === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();

        // Draw area fill under curve (if not anti-red)
        if (!isAntiRed) {
          ctx.fillStyle = 'rgba(191, 90, 242, 0.1)';
          ctx.beginPath();
          ctx.moveTo(getX(0), height - padding);
          points.forEach((p, idx) => ctx.lineTo(getX(idx), getY(p.weight)));
          ctx.lineTo(getX(points.length - 1), height - padding);
          ctx.closePath();
          ctx.fill();
        }

        // Draw point dots and text value labels
        points.forEach((p, idx) => {
          const x = getX(idx);
          const y = getY(p.weight);

          // Dot
          ctx.fillStyle = strokeColor;
          ctx.beginPath();
          ctx.arc(x, y, 4, 0, Math.PI * 2);
          ctx.fill();

          // Label above point
          ctx.fillStyle = isAntiRed ? '#ffd700' : '#ffffff';
          ctx.font = 'bold 9px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(p.label, x, y - 8);

          // Date below axis
          ctx.fillStyle = textColor;
          ctx.font = '8px sans-serif';
          const dateStr = `${p.date.getMonth() + 1}/${p.date.getDate()}`;
          ctx.fillText(dateStr, x, height - padding + 14);
        });

      }, [data, selectedExercise]);

      if (!data || data.length < 2) {
        return (
          <div className="chart-container" style={{display: "flex", alignItems: "center", justifyContent: "center", color: "var(--text-secondary)", fontSize: "14px"}}>
            📉 Complete this exercise twice to start tracking progression
          </div>
        );
      }

      return (
        <div className="chart-container">
          <canvas ref={canvasRef} className="chart-svg" style={{width: "100%", height: "100%"}}></canvas>
        </div>
      );
    }

    // ── ACTIVE TIMER SESSION PLAYER OVERLAY ───────────────────────────────────────
    // Multi-mode: Workout Sets, Tendon Holds, Stretching Splits
    function SessionPlayer({routineName, exercises, onFinish, onCancel}) {
      const [exIdx, setExIdx] = useState(0);
      const [setIdx, setSetIdx] = useState(0);
      const [mode, setMode] = useState("work"); // "work", "rest_prepare", "rest", "split_transition"
      
      const activeEx = exercises[exIdx];
      const nextEx = exIdx + 1 < exercises.length ? exercises[exIdx + 1] : null;

      // Single-side stretch detection
      const sideLabels = activeEx.sideLabels || [];
      const hasSides = sideLabels.length > 0;
      const [currentSideIdx, setCurrentSideIdx] = useState(0);

      // Timer calculation variables
      const [targetSeconds, setTargetSeconds] = useState(90);
      const [remaining, setRemaining] = useState(90);
      const [isRunning, setIsRunning] = useState(false);
      
      // Timestamp syncing for resilient background operation
      const startTimeRef = useRef(0);
      const accumulatedTimeRef = useRef(0);
      const requestRef = useRef(null);

      // Setup active target seconds
      const setupTimer = () => {
        setIsRunning(false);
        accumulatedTimeRef.current = 0;

        if (mode === "work") {
          if (activeEx.hold) {
            const secs = parseInt(activeEx.hold.replace(/[^\d]/g, '')) || 30;
            const parsed = hasSides ? Math.round(secs / sideLabels.length) : secs;
            setTargetSeconds(parsed);
            setRemaining(parsed);
          } else if (activeEx.totalSec) {
            const parsed = hasSides ? Math.round(activeEx.totalSec / sideLabels.length) : activeEx.totalSec;
            setTargetSeconds(parsed);
            setRemaining(parsed);
          } else {
            // standard exercise reps (no timer)
            setTargetSeconds(0);
            setRemaining(0);
          }
        } else if (mode === "rest") {
          const restVal = parseRestSec(activeEx.rest);
          setTargetSeconds(restVal);
          setRemaining(restVal);
        } else if (mode === "split_transition") {
          setTargetSeconds(3); // brief 3 seconds switch alert
          setRemaining(3);
          setIsRunning(true); // automatically start transitions
          startTimeRef.current = Date.now();
        }
      };

      useEffect(() => {
        setupTimer();
      }, [exIdx, setIdx, mode, currentSideIdx]);

      // Timer Animation & Delta Engine (Resilient Clock Sync)
      const tick = () => {
        if (!isRunning) return;
        const now = Date.now();
        const elapsedMs = now - startTimeRef.current + accumulatedTimeRef.current;
        const elapsedSec = Math.floor(elapsedMs / 1000);
        const rem = Math.max(0, targetSeconds - elapsedSec);

        // Sound cues for last 3 seconds
        if (rem !== remaining && rem > 0 && rem <= 3 && mode === "work") {
          triggerSound('tick');
        }

        setRemaining(rem);

        if (rem <= 0) {
          handleTimerComplete();
        } else {
          requestRef.current = requestAnimationFrame(tick);
        }
      };

      useEffect(() => {
        if (isRunning) {
          startTimeRef.current = Date.now();
          requestRef.current = requestAnimationFrame(tick);
        } else {
          cancelAnimationFrame(requestRef.current);
        }
        return () => cancelAnimationFrame(requestRef.current);
      }, [isRunning, targetSeconds]);

      const toggleTimer = () => {
        if (isRunning) {
          accumulatedTimeRef.current += Date.now() - startTimeRef.current;
          setIsRunning(false);
        } else {
          startTimeRef.current = Date.now();
          setIsRunning(true);
        }
      };

      const restartTimer = () => {
        setIsRunning(false);
        accumulatedTimeRef.current = 0;
        setRemaining(targetSeconds);
      };

      // Sound and flow controllers
      const handleTimerComplete = () => {
        setIsRunning(false);
        
        if (mode === "work") {
          if (hasSides && currentSideIdx + 1 < sideLabels.length) {
            triggerSound('beep-high');
            setMode("split_transition");
          } else {
            triggerSound('chime');
            // Log set data automatically
            onLogSet(activeEx, activeEx.weight || activeEx.defaultWeight || "");
            
            if (activeEx.rest && activeEx.rest !== "0s") {
              setMode("rest_prepare"); // Pause, wait for ready rest click
            } else {
              moveToNext();
            }
          }
        } else if (mode === "rest") {
          triggerSound('rest-chime');
          moveToNext();
        } else if (mode === "split_transition") {
          setCurrentSideIdx(currentSideIdx + 1);
          setMode("work");
        }
      };

      const skipTimer = () => {
        setIsRunning(false);
        if (mode === "work") {
          if (hasSides && currentSideIdx + 1 < sideLabels.length) {
            setCurrentSideIdx(currentSideIdx + 1);
            setupTimer();
          } else {
            onLogSet(activeEx, activeEx.weight || activeEx.defaultWeight || "");
            if (activeEx.rest) setMode("rest_prepare");
            else moveToNext();
          }
        } else if (mode === "rest" || mode === "rest_prepare" || mode === "split_transition") {
          moveToNext();
        }
      };

      const startRestTimer = () => {
        setMode("rest");
        setIsRunning(true);
        startTimeRef.current = Date.now();
      };

      const moveToNext = () => {
        setCurrentSideIdx(0);
        const maxSets = activeEx.sets || 1;
        
        if (setIdx + 1 < maxSets) {
          setSetIdx(setIdx + 1);
          setMode("work");
        } else {
          if (exIdx + 1 < exercises.length) {
            setExIdx(exIdx + 1);
            setSetIdx(0);
            setMode("work");
          } else {
            // Whole routine finished
            onLogSession(exercises.length, exercises.length, false);
            onFinish();
          }
        }
      };

      const finishEarly = () => {
        const confirmFinish = confirm("Finish this session early? Your progress will be logged as a Partial Session.");
        if (confirmFinish) {
          const completedCount = exIdx; // current count of exercises fully finished
          onLogSession(exercises.length, completedCount, true);
          onFinish();
        }
      };

      // Logging helpers
      const onLogSet = (ex, weight) => {
        const prog = store.get("workout_progression", []);
        prog.push({
          id: uid(),
          date: new Date().toISOString().split('T')[0],
          exercise: ex.name,
          weight: weight || "0",
          hold: ex.hold || ex.totalSec || "0"
        });
        store.set("workout_progression", prog);
      };

      const onLogSession = (total, completed, isPartial) => {
        const logs = store.get("workout_logs", []);
        const today = new Date().toISOString().split('T')[0];
        
        // Append log
        logs.push({
          id: uid(),
          date: today,
          routine: routineName,
          total,
          completed,
          isPartial
        });
        store.set("workout_logs", logs);

        // Update total counters
        const counts = store.get("workout_completed_counts", {workouts:0, tendons:0, stretches:0});
        if (routineName.includes("Phase")) {
          if (routineName.includes("Tendon")) counts.tendons += 1;
          else counts.stretches += 1;
        } else {
          counts.workouts += 1;
        }
        store.set("workout_completed_counts", counts);
      };

      // Compute visual progress percentage
      const progressPercent = targetSeconds > 0 ? ((targetSeconds - remaining) / targetSeconds) * 100 : 0;
      const strokeDashoffset = 628 - (628 * progressPercent) / 100;

      return (
        <div className="timer-overlay">
          {/* Header */}
          <div className="flex-between" style={{width: "100%", marginBottom: "10px"}}>
            <div>
              <span className="badge" style={{marginLeft: "0", background: "var(--accent-muted)"}}>
                {routineName}
              </span>
              <p className="text-small" style={{marginTop: "4px"}}>Exercise {exIdx + 1} of {exercises.length} • Set {setIdx + 1} of {activeEx.sets || 1}</p>
            </div>
            <button className="button-secondary" style={{width: "auto", padding: "6px 12px", fontSize: "12px", border: "1.5px solid var(--danger)", color: "var(--danger)", background: "transparent"}} onClick={finishEarly}>
              Finish Early
            </button>
          </div>

          <div style={{flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center"}}>
            
            {/* Split switch banner */}
            {mode === "split_transition" && (
              <div className="card text-warning" style={{borderColor: "var(--warning)", width: "100%", textAlign: "center", padding: "12px", fontSize: "18px", fontWeight: "800", animation: "pulse 1s infinite"}}>
                👉 CHANGE SIDE! Prepare {sideLabels[currentSideIdx + 1]}
              </div>
            )}

            {/* Display Active Mode Text */}
            <h2 className="font-bold" style={{fontSize: "24px", textAlign: "center", marginBottom: "4px"}}>
              {activeEx.name}
            </h2>
            <p className="text-small font-bold" style={{textTransform: "uppercase", letterSpacing: "0.05em", color: "var(--accent)"}}>
              {mode === "work" && (hasSides ? `${sideLabels[currentSideIdx]} hold` : "ACTIVE WORK")}
              {mode === "rest_prepare" && "Ready for Rest"}
              {mode === "rest" && "RESTING"}
              {mode === "split_transition" && "TRANSITION"}
            </p>

            {/* Hold Timer Circle */}
            {(mode === "work" && targetSeconds > 0) || mode === "rest" || mode === "split_transition" ? (
              <div className="timer-circle-container">
                <svg className="timer-circle-svg" viewBox="0 0 220 220">
                  <circle className="timer-circle-bg" cx="110" cy="110" r="100"></circle>
                  <circle 
                    className="timer-circle-progress" 
                    cx="110" 
                    cy="110" 
                    r="100"
                    strokeDasharray="628"
                    strokeDashoffset={strokeDashoffset}
                  ></circle>
                </svg>
                <div className="timer-display">
                  <span>{fmtTime(remaining)}</span>
                  <span className="timer-label">{mode === "work" ? "hold" : "rest"}</span>
                </div>
              </div>
            ) : (
              // Reps interface (No Timer needed)
              <div style={{margin: "40px auto", textAlign: "center"}}>
                {mode === "work" && (
                  <div>
                    <div style={{fontSize: "52px", fontWeight: "900", letterSpacing: "-0.02em"}}>{activeEx.reps}</div>
                    <div className="timer-label" style={{fontSize: "14px"}}>Target Reps</div>
                    {activeEx.weight && (
                      <div className="badge" style={{marginTop: "12px", fontSize: "14px", padding: "6px 14px"}}>{activeEx.weight}</div>
                    )}
                  </div>
                )}
                {mode === "rest_prepare" && (
                  <div style={{textAlign: "center"}}>
                    <p style={{fontSize: "18px", marginBottom: "16px"}}>Nice set! Up to {activeEx.rest} rest.</p>
                    <button className="button-primary" onClick={startRestTimer}>Start Rest Timer</button>
                  </div>
                )}
              </div>
            )}

            {/* Instruction Cues */}
            {mode === "work" && (
              <div className="exercise-cue-box" style={{width: "100%", maxHeight: "110px", overflowY: "auto"}}>
                <strong>Focus Cue:</strong> {activeEx.cue}
              </div>
            )}

            {/* Workout Cues during rests */}
            {(mode === "rest" || mode === "rest_prepare") && nextEx && (
              <div className="card" style={{width: "100%", background: "var(--input-bg)"}}>
                <p className="text-small font-bold" style={{textTransform: "uppercase", color: "var(--accent)"}}>Up Next</p>
                <p className="font-bold" style={{fontSize: "16px", marginTop: "2px"}}>{nextEx.name}</p>
                <p className="text-small" style={{fontSize: "12px"}}>{nextEx.equip} • {nextEx.sets} set{nextEx.sets > 1 ? "s" : ""} • {nextEx.reps || nextEx.hold}</p>
              </div>
            )}
          </div>

          {/* Interactive Player Controls */}
          <div style={{display: "flex", flexDirection: "column", gap: "16px", alignItems: "center"}}>
            
            {/* Pause/Play/Restart controls */}
            {((mode === "work" && targetSeconds > 0) || mode === "rest") && (
              <div style={{display: "flex", gap: "24px", alignItems: "center"}}>
                <button className="restart-btn" onClick={restartTimer}>
                  <Icons.Refresh size={22} />
                </button>
                <button className="play-pause-btn" onClick={toggleTimer}>
                  {isRunning ? <Icons.Pause size={28} /> : <Icons.Play size={28} />}
                </button>
                <button className="restart-btn" style={{opacity: 0, pointerEvents: "none"}}>
                  <Icons.Refresh size={22} />
                </button>
              </div>
            )}

            {/* Manual completion for rep-based work */}
            {mode === "work" && targetSeconds === 0 && (
              <button className="button-primary" style={{padding: "16px 20px", fontSize: "18px"}} onClick={handleTimerComplete}>
                Set Completed ✔
              </button>
            )}

            {/* Big, highly visible Skip / Next Button */}
            <div style={{display: "flex", width: "100%", justifyContent: "center", gap: "12px", marginTop: "10px"}}>
              <button className="skip-btn-large" onClick={skipTimer}>
                Skip {mode === "work" ? "Hold" : "Rest"} ➔
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ── MAIN APPLICATION WRAPPER ──────────────────────────────────────────────────
    function App() {
      const [activeTab, setActiveTab] = useState("home"); // "home", "workouts", "tendons", "stretches", "progression"
      const [theme, setTheme] = useState(() => store.get("workout_theme", "dark"));
      const [weights, setWeights] = useState(() => store.get("workout_weights", {}));
      
      // Exercises configurations (Workout additions/deletions saved locally)
      const [workouts, setWorkouts] = useState(() => store.get("workout_sections_custom", FB_SECTIONS));
      
      // Completion and tracking logs state
      const [logs, setLogs] = useState(() => store.get("workout_logs", []));
      const [counts, setCounts] = useState(() => store.get("workout_completed_counts", {workouts:0, tendons:0, stretches:0}));

      // Active player routine overlays
      const [activeRoutine, setActiveRoutine] = useState(null); // { name, exercises }

      // Custom dialog modal tracking
      const [modalContent, setModalContent] = useState(null); // { type, data }

      // Set document theme attribute
      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        store.set("workout_theme", theme);
      }, [theme]);

      // Sync active state counters
      const reloadLogs = () => {
        setLogs(store.get("workout_logs", []));
        setCounts(store.get("workout_completed_counts", {workouts:0, tendons:0, stretches:0}));
      };

      const saveWeight = (key, val) => {
        const upd = {...weights, [key]: val};
        setWeights(upd);
        store.set("workout_weights", upd);
      };

      const triggerThemeToggle = () => {
        const themes = ["dark", "light", "anti-red"];
        const next = themes[(themes.indexOf(theme) + 1) % themes.length];
        setTheme(next);
      };

      // ── RENDER HOME TAB ────────────────────────────────────────────────────────
      const renderHome = () => {
        // Build 30-Day Contribution Grid Calendar
        const last30Days = [];
        const today = new Date();
        
        for (let i = 29; i >= 0; i--) {
          const d = new Date();
          d.setDate(today.getDate() - i);
          const dateStr = d.toISOString().split('T')[0];
          
          // Check for completed logs on this date
          const dayLogs = logs.filter(l => l.date === dateStr);
          let status = "none"; // "none", "completed", "partial"
          if (dayLogs.length > 0) {
            const hasFull = dayLogs.some(l => !l.isPartial);
            status = hasFull ? "completed" : "partial";
          }

          last30Days.push({
            date: dateStr,
            dayName: d.toLocaleDateString('en-US', {weekday: 'short'}).charAt(0),
            dayNum: d.getDate(),
            status,
            logs: dayLogs
          });
        }

        const showDayDetails = (day) => {
          if (day.logs.length === 0) return;
          setModalContent({
            type: "day_details",
            data: day
          });
        };

        return (
          <div>
            <div className="card">
              <h2 className="font-bold" style={{fontSize: "20px", marginBottom: "4px"}}>Welcome Back</h2>
              <p className="text-small">Keep tracking your strength & joint longevity daily</p>
              
              <div className="badge-bar" style={{marginTop: "16px"}}>
                <div className="session-badge">
                  <span>💪 Workouts:</span>
                  <span className="text-accent font-bold">{counts.workouts} done</span>
                </div>
                <div className="session-badge">
                  <span>🦵 Tendons:</span>
                  <span className="text-accent font-bold">{counts.tendons} done</span>
                </div>
                <div className="session-badge">
                  <span>🧘 Stretches:</span>
                  <span className="text-accent font-bold">{counts.stretches} done</span>
                </div>
              </div>
            </div>

            {/* 30-Day History Calendar Grid */}
            <div className="card">
              <h3 className="font-bold" style={{fontSize: "16px"}}>30-Day Grid</h3>
              <p className="text-small" style={{marginBottom: "12px"}}>Tap on highlighted days to view session logs</p>
              
              <div className="calendar-grid">
                {/* Week headers */}
                {["S","M","T","W","T","F","S"].map((h, i) => (
                  <div key={i} className="calendar-header-day">{h}</div>
                ))}
                
                {/* Padding to align first grid blocks based on correct day-of-week */}
                {Array.from({length: new Date(last30Days[0].date).getDay()}).map((_, i) => (
                  <div key={`pad-${i}`} className="calendar-day-box empty"></div>
                ))}

                {last30Days.map((day, idx) => (
                  <div 
                    key={idx} 
                    onClick={() => showDayDetails(day)}
                    className={`calendar-day-box ${day.status === "completed" ? "completed" : ""} ${day.status === "partial" ? "partial" : ""} ${day.date === today.toISOString().split('T')[0] ? "today" : ""}`}
                  >
                    <span>{day.dayNum}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Support Config toggles */}
            <SoundConfigCard />
            <WakeLockToggle />
          </div>
        );
      };

      // ── RENDER STRENGTH WORKOUTS TAB ───────────────────────────────────────────
      const renderWorkouts = () => {
        const [activeSection, setActiveSection] = useState(null);

        const triggerEdit = (ex, secName) => {
          setModalContent({
            type: "edit_exercise",
            data: { ex, secName, type: "workout" }
          });
        };

        const handleEditSave = (updatedEx) => {
          const updatedWorkouts = workouts.map(s => {
            if (s.section === modalContent.data.secName) {
              return {
                ...s,
                exercises: s.exercises.map(e => e.name === modalContent.data.ex.name ? updatedEx : e)
              };
            }
            return s;
          });
          setWorkouts(updatedWorkouts);
          store.set("workout_sections_custom", updatedWorkouts);
          setModalContent(null);
        };

        const handleEditDelete = () => {
          const updatedWorkouts = workouts.map(s => {
            if (s.section === modalContent.data.secName) {
              return {
                ...s,
                exercises: s.exercises.filter(e => e.name !== modalContent.data.ex.name)
              };
            }
            return s;
          });
          setWorkouts(updatedWorkouts);
          store.set("workout_sections_custom", updatedWorkouts);
          setModalContent(null);
        };

        const handleAddExercise = (secName) => {
          const newExName = prompt("Enter new exercise name:");
          if (!newExName) return;
          const updatedWorkouts = workouts.map(s => {
            if (s.section === secName) {
              return {
                ...s,
                exercises: [...s.exercises, {
                  name: newExName,
                  equip: "Bodyweight",
                  sets: 1,
                  reps: "10-12",
                  rest: "90s",
                  cue: "Custom exercise cue details."
                }]
              };
            }
            return s;
          });
          setWorkouts(updatedWorkouts);
          store.set("workout_sections_custom", updatedWorkouts);
        };

        const launchSectionSession = (sec) => {
          // Bind custom weights saved locally to active routine exercises
          const loadedExercises = sec.exercises.map(e => ({
            ...e,
            weight: weights[e.name] || e.weight || ""
          }));
          
          setActiveRoutine({
            name: `${sec.section} Workout`,
            exercises: loadedExercises
          });
        };

        return (
          <div>
            <div className="card" style={{display: "flex", justifyContent: "space-between", alignItems: "center"}}>
              <div>
                <h2 className="font-bold" style={{fontSize: "20px"}}>Strength & Hypertrophy</h2>
                <p className="text-small">Progressive overload tracking</p>
              </div>
              <span className="badge" style={{background: "var(--success-muted)", color: "var(--success)", borderColor: "var(--success)"}}>
                {counts.workouts} Sessions Done
              </span>
            </div>

            {workouts.map((sec, secIdx) => {
              const isOpen = activeSection === sec.section;
              return (
                <div key={secIdx} className="card" style={{padding: "12px 16px"}}>
                  <div className="flex-between" style={{cursor: "pointer"}} onClick={() => setActiveSection(isOpen ? null : sec.section)}>
                    <div className="flex-row">
                      <p className="font-bold" style={{fontSize: "17px"}}>{sec.section}</p>
                      <span className="exercise-count-badge">{sec.exercises.length} Exercises</span>
                    </div>
                    <span style={{fontSize: "18px", transition: "transform 0.2s", transform: isOpen ? "rotate(90deg)" : "none"}}>➔</span>
                  </div>

                  {isOpen && (
                    <div style={{marginTop: "16px", borderTop: "1px solid var(--card-border)", paddingTop: "12px"}}>
                      
                      {/* Section Session Player Launch */}
                      <button className="button-primary" style={{marginBottom: "16px", padding: "10px 14px", fontSize: "14px"}} onClick={() => launchSectionSession(sec)}>
                        ▶ Start Section Session Flow
                      </button>

                      {sec.exercises.map((ex, exIdx) => (
                        <div key={exIdx} className="flex-between" style={{padding: "10px 0", borderBottom: exIdx + 1 < sec.exercises.length ? "0.5px solid var(--card-border)" : "none"}}>
                          <div style={{maxWidth: "60%", cursor: "pointer"}} onClick={() => triggerEdit(ex, sec.section)}>
                            <p className="font-bold" style={{fontSize: "14px", textDecoration: "underline"}}>{ex.name}</p>
                            <p className="text-small" style={{fontSize: "11px", marginTop: "2px"}}>{ex.equip} • {ex.sets} sets • {ex.reps}</p>
                          </div>
                          
                          {/* Weight selector chip */}
                          <WeightChip 
                            exKey={ex.name} 
                            defaultWeight={ex.weight} 
                            color="var(--accent)" 
                            weights={weights} 
                            onSave={saveWeight} 
                          />
                        </div>
                      ))}

                      <button className="button-secondary" style={{marginTop: "12px", padding: "8px", fontSize: "13px"}} onClick={() => handleAddExercise(sec.section)}>
                        ➕ Add Custom Exercise
                      </button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      };

      // ── RENDER REHAB TENDONS TAB ───────────────────────────────────────────────
      const renderTendons = () => {
        const [selectedPhase, setSelectedPhase] = useState("p1");
        const phaseData = TENDON[selectedPhase];

        const launchTendonSession = (sess) => {
          // Holds for tendons specifically but all holds don’t need reps.
          // Map hold property inside active timers automatically
          const exercises = sess.exercises.map(e => ({
            ...e,
            sets: e.sets || 3,
            hold: e.hold || "30s",
            weight: weights[e.name] || e.weight || "",
            // Provide empty rep configuration so UI renders holds instead of reps
            reps: null
          }));

          setActiveRoutine({
            name: `Tendon Rehab - ${phaseData.label} (${sess.label})`,
            exercises
          });
        };

        return (
          <div>
            {/* Phase Selector tabs */}
            <div className="card" style={{padding: "8px", display: "flex", gap: "6px", marginBottom: "14px"}}>
              {Object.keys(TENDON).map((key) => (
                <button
                  key={key}
                  onClick={() => setSelectedPhase(key)}
                  style={{
                    flex: 1, padding: "10px", borderRadius: "10px",
                    background: selectedPhase === key ? TENDON[key].color : "transparent",
                    color: selectedPhase === key ? "var(--btn-text)" : "var(--text-secondary)",
                    fontWeight: "700", fontSize: "13px"
                  }}
                >
                  {TENDON[key].label}
                </button>
              ))}
            </div>

            <div className="card">
              <div className="flex-between">
                <div>
                  <h2 className="font-bold" style={{fontSize: "20px", color: phaseData.color}}>{phaseData.name} Rehab</h2>
                  <p className="text-small">{phaseData.weeks}</p>
                </div>
                <span className="badge" style={{background: `${phaseData.color}20`, color: phaseData.color, borderColor: phaseData.color}}>
                  {counts.tendons} Completed
                </span>
              </div>
              <p className="exercise-cue-box" style={{borderLeftColor: phaseData.color, marginTop: "14px"}}>
                {phaseData.meta}
              </p>
            </div>

            {/* Sessions Cards */}
            {phaseData.sessions.map((sess, idx) => (
              <div key={idx} className="card">
                <div className="flex-between" style={{marginBottom: "12px"}}>
                  <div>
                    <h3 className="font-bold" style={{fontSize: "17px"}}>{sess.label}</h3>
                    <p className="text-small">{sess.day}</p>
                  </div>
                  <button className="button-primary" style={{width: "auto", padding: "8px 16px", fontSize: "13px", background: phaseData.color, borderColor: phaseData.color}} onClick={() => launchTendonSession(sess)}>
                    ▶ Play
                  </button>
                </div>

                <div style={{borderTop: "1.5px solid var(--card-border)", paddingTop: "8px"}}>
                  {sess.exercises.map((ex, exIdx) => (
                    <div key={exIdx} className="flex-between" style={{padding: "8px 0", borderBottom: exIdx + 1 < sess.exercises.length ? "0.5px solid var(--card-border)" : "none"}}>
                      <div style={{maxWidth: "60%"}}>
                        <p className="font-bold" style={{fontSize: "14px"}}>{ex.name}</p>
                        {/* Holds don't need reps display */}
                        <p className="text-small" style={{fontSize: "11px"}}>{ex.equip} • {ex.sets} sets • Hold {ex.hold}</p>
                      </div>
                      
                      <WeightChip 
                        exKey={ex.name} 
                        defaultWeight={ex.weight} 
                        color={phaseData.color} 
                        weights={weights} 
                        onSave={saveWeight} 
                      />
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        );
      };

      // ── RENDER MOBILITY STRETCHES TAB ──────────────────────────────────────────
      const renderStretches = () => {
        const [selectedPhase, setSelectedPhase] = useState(1);
        const phaseData = SPHASE[selectedPhase];
        const stretchList = getPhaseStretches(selectedPhase);

        const launchStretchSession = () => {
          // Process stretch lists and compile separate timers for one-sided exercises
          const exercises = [];
          
          stretchList.forEach(s => {
            const sideLabels = s.sideLabels || [];
            
            if (sideLabels.length > 0) {
              // For stretches, if its a one sided stretch do a separate timer instead of an overall timer
              // Set hold seconds specifically for the sides
              const rawSecs = s.totalSec;
              exercises.push({
                ...s,
                sets: 1,
                hold: `${rawSecs}s`,
                rest: "30s", // standard transition rest
                sideLabels
              });
            } else {
              exercises.push({
                ...s,
                sets: 1,
                hold: `${s.totalSec}s`,
                rest: "30s"
              });
            }
          });

          setActiveRoutine({
            name: `Stretch Phase ${selectedPhase} — ${phaseData.name}`,
            exercises
          });
        };

        return (
          <div>
            {/* Phase Tabs Selector */}
            <div className="card" style={{padding: "8px", display: "flex", gap: "4px", marginBottom: "14px", overflowX: "auto"}}>
              {Object.keys(SPHASE).map((key) => {
                const isActive = selectedPhase === parseInt(key);
                return (
                  <button
                    key={key}
                    onClick={() => setSelectedPhase(parseInt(key))}
                    style={{
                      flex: "1 0 auto", padding: "8px 12px", borderRadius: "10px",
                      background: isActive ? SPHASE[key].color : "transparent",
                      color: isActive ? "var(--btn-text)" : "var(--text-secondary)",
                      fontWeight: "700", fontSize: "12px"
                    }}
                  >
                    Phase {key}
                  </button>
                );
              })}
            </div>

            <div className="card">
              <div className="flex-between">
                <div>
                  <h2 className="font-bold" style={{fontSize: "20px", color: phaseData.color}}>{phaseData.name}</h2>
                  <p className="text-small">{phaseData.months}</p>
                </div>
                <span className="badge" style={{background: `${phaseData.color}20`, color: phaseData.color, borderColor: phaseData.color}}>
                  {counts.stretches} Completed
                </span>
              </div>
              <p className="text-small" style={{marginTop: "8px"}}>{phaseData.desc}</p>
              
              <button className="button-primary" style={{marginTop: "16px", background: phaseData.color, borderColor: phaseData.color}} onClick={launchStretchSession}>
                ▶ Start Phase Stretching Flow ({fmtMin(getPhaseTotalSec(selectedPhase))})
              </button>
            </div>

            {/* Stretch Guides details Accordions */}
            <div className="card" style={{padding: "8px 16px"}}>
              <h3 className="font-bold" style={{fontSize: "16px", marginBottom: "12px"}}>Phase Stretching Guides</h3>
              {PHASE_INFO[selectedPhase] && PHASE_INFO[selectedPhase].map((info, idx) => (
                <div key={idx} style={{marginBottom: "14px", borderBottom: idx + 1 < PHASE_INFO[selectedPhase].length ? "0.5px solid var(--card-border)" : "none", paddingBottom: "10px"}}>
                  <h4 className="font-bold" style={{fontSize: "14px", color: phaseData.color}}>{info.title}</h4>
                  {info.body && info.body.map((b, bIdx) => <p key={bIdx} className="text-small" style={{fontSize: "12px", marginTop: "4px"}}>{b}</p>)}
                  {info.items && (
                    <ul style={{paddingLeft: "16px", marginTop: "6px"}}>
                      {info.items.map((it, itIdx) => <li key={itIdx} className="text-small" style={{fontSize: "12px", listStyle: "circle", marginBottom: "4px"}}>{it}</li>)}
                    </ul>
                  )}
                </div>
              ))}
            </div>

            {/* List of active stretches */}
            <div className="card" style={{padding: "12px 16px"}}>
              <h3 className="font-bold" style={{fontSize: "16px", marginBottom: "12px"}}>Exercises Included</h3>
              {stretchList.map((st, idx) => (
                <div key={idx} style={{padding: "10px 0", borderBottom: idx + 1 < stretchList.length ? "0.5px solid var(--card-border)" : "none"}}>
                  <div className="flex-between">
                    <p className="font-bold" style={{fontSize: "14px"}}>{st.name} {st.isNew && <span className="badge" style={{fontSize: "9px"}}>NEW</span>}</p>
                    <span className="text-small font-bold" style={{color: phaseData.color}}>{st.totalSec}s</span>
                  </div>
                  <p className="text-small" style={{fontSize: "12px", marginTop: "4px"}}>{st.phases[selectedPhase]?.how || st.phases[1]?.how}</p>
                </div>
              ))}
            </div>
          </div>
        );
      };

      // ── RENDER PROGRESSION DASHBOARD TAB ───────────────────────────────────────
      const renderProgression = () => {
        // Find all logged exercises to construct dropdown selectors
        const trackedPoints = store.get("workout_progression", []);
        const uniqueExercises = [...new Set(trackedPoints.map(p => p.exercise))];
        const [selectedEx, setSelectedEx] = useState(uniqueExercises[0] || "");

        const filteredLogs = trackedPoints.filter(p => p.exercise === selectedEx);

        const handleResetProgression = () => {
          const conf = confirm("Delete all training history data? This cannot be undone.");
          if (conf) {
            localStorage.removeItem("workout_progression");
            localStorage.removeItem("workout_logs");
            localStorage.removeItem("workout_completed_counts");
            reloadLogs();
            setSelectedEx("");
          }
        };

        return (
          <div>
            <div className="card">
              <h2 className="font-bold" style={{fontSize: "20px"}}>Strength & Hold Progression</h2>
              <p className="text-small">Visual progression analysis (zero-dependency Canvas charts)</p>
            </div>

            {uniqueExercises.length === 0 ? (
              <div className="card" style={{textAlign: "center", padding: "40px 20px", color: "var(--text-secondary)"}}>
                🏋️ No data logged yet. Complete standard sets inside Strength or Tendons to start tracking.
              </div>
            ) : (
              <div>
                {/* Select dropdown */}
                <div className="card">
                  <label className="field-label">Choose Exercise</label>
                  <select 
                    className="field" 
                    value={selectedEx} 
                    onChange={e => setSelectedEx(e.target.value)}
                    style={{background: "var(--input-bg)", cursor: "pointer"}}
                  >
                    {uniqueExercises.map((ue, idx) => (
                      <option key={idx} value={ue}>{ue}</option>
                    ))}
                  </select>

                  <h3 className="font-bold" style={{fontSize: "15px", marginTop: "14px"}}>Progression Curve</h3>
                  <ProgressionChart data={filteredLogs} selectedExercise={selectedEx} />
                </div>

                {/* Historical records */}
                <div className="card">
                  <h3 className="font-bold" style={{fontSize: "15px", marginBottom: "10px"}}>Logged Logs</h3>
                  {filteredLogs.reverse().map((l, idx) => (
                    <div key={idx} className="progression-item">
                      <span>📅 {l.date}</span>
                      <span className="font-bold text-accent">Hold/Weight: {l.weight || "BW"}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Reset data */}
            <div className="card" style={{border: "1px dashed var(--danger)"}}>
              <p className="font-bold text-danger">Danger Zone</p>
              <p className="text-small" style={{marginBottom: "12px"}}>Wipe all logged history and streak database counters.</p>
              <button className="button-secondary" style={{color: "var(--danger)", border: "1.5px solid var(--danger)", background: "transparent"}} onClick={handleResetProgression}>
                Reset All Tracking Data
              </button>
            </div>
          </div>
        );
      };

      // ── Tap-Outside Modal Renderers ─────────────────────────────────────────────
      const renderModal = () => {
        if (!modalContent) return null;

        if (modalContent.type === "day_details") {
          const day = modalContent.data;
          return (
            <TapModal isOpen={true} onClose={() => setModalContent(null)}>
              <h3 className="font-bold" style={{fontSize: "18px", marginBottom: "12px"}}>Completions on {day.date}</h3>
              {day.logs.map((l, idx) => (
                <div key={idx} className="card" style={{background: "var(--input-bg)", marginBottom: "8px"}}>
                  <div className="flex-between">
                    <p className="font-bold">{l.routine}</p>
                    <span className={l.isPartial ? "text-warning font-bold" : "text-success font-bold"}>
                      {l.isPartial ? "Partial (Half-Done)" : "Completed ✔"}
                    </span>
                  </div>
                  <p className="text-small" style={{marginTop: "4px"}}>Finished: {l.completed} of {l.total} exercises</p>
                </div>
              ))}
            </TapModal>
          );
        }

        if (modalContent.type === "edit_exercise") {
          return (
            <TapModal isOpen={true} onClose={() => setModalContent(null)}>
              <EditModal 
                ex={modalContent.data.ex}
                onSave={handleEditSave}
                onDelete={handleEditDelete}
                onClose={() => setModalContent(null)}
              />
            </TapModal>
          );
        }

        return null;
      };

      return (
        <div>
          {/* Header Bar */}
          <header>
            <div className="app-title font-bold text-accent">WORKOUT FLOW</div>
            <button 
              onClick={triggerThemeToggle} 
              style={{
                border: "1.5px solid var(--card-border)", borderRadius: "20px",
                padding: "6px 14px", fontSize: "12px", fontWeight: "700", textTransform: "uppercase"
              }}
            >
              Theme: {theme}
            </button>
          </header>

          {/* Active Overlay Session Player */}
          {activeRoutine && (
            <SessionPlayer 
              routineName={activeRoutine.name}
              exercises={activeRoutine.exercises}
              onFinish={() => {
                setActiveRoutine(null);
                reloadLogs();
              }}
              onCancel={() => setActiveRoutine(null)}
            />
          )}

          {/* Body Content Container */}
          <div className="container">
            {activeTab === "home" && renderHome()}
            {activeTab === "workouts" && renderWorkouts()}
            {activeTab === "tendons" && renderTendons()}
            {activeTab === "stretches" && renderStretches()}
            {activeTab === "progression" && renderProgression()}
          </div>

          {/* Modals manager */}
          {renderModal()}

          {/* Persistent Nav Tab Bar */}
          <div className="tab-bar">
            <button className={`tab-btn ${activeTab === "home" ? "active" : ""}`} onClick={() => setActiveTab("home")}>
              <Icons.Home />
              <span>Home</span>
            </button>
            <button className={`tab-btn ${activeTab === "workouts" ? "active" : ""}`} onClick={() => setActiveTab("workouts")}>
              <Icons.Dumbbell />
              <span>Workouts</span>
            </button>
            <button className={`tab-btn ${activeTab === "tendons" ? "active" : ""}`} onClick={() => setActiveTab("tendons")}>
              <Icons.Tendon />
              <span>Tendons</span>
            </button>
            <button className={`tab-btn ${activeTab === "stretches" ? "active" : ""}`} onClick={() => setActiveTab("stretches")}>
              <Icons.Stretch />
              <span>Stretches</span>
            </button>
            <button className={`tab-btn ${activeTab === "progression" ? "active" : ""}`} onClick={() => setActiveTab("progression")}>
              <Icons.Chart />
              <span>Progress</span>
            </button>
          </div>
        </div>
      );
    }

    const rootElement = document.getElementById("root");
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
