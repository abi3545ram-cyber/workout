      1: { duration: "60s total", cue: "On hands and knees. Rotate hands to face different directions. Prayer position. Reverse prayer. Rock weight forward and back. Wrist circles each direction. All positions, gentle loading." },
      2: { duration: "90s total", cue: "Add sustained holds in your most uncomfortable position - usually fingers pointing backwards. 10-second holds in each challenging angle." },
      3: { duration: "60s + holds", cue: "Progress to wrist push-ups on knuckles. Then on finger pads if comfortable. Gymnastic wrist conditioning progression." },
      4: { duration: "90s full sequence", cue: "Full gymnastic wrist conditioning: standard, knuckles, fingers, reverse, side-to-side, and active circles under load." },
      5: { duration: "60s", cue: "Maintenance. Supports handstand loading and long-term wrist health with keyboard use. Never skip." },
    }},
  { name: "Neck Release", target: "Cervical Spine / Upper Traps / Scalenes", type: "Static / Gentle",
    phases: {
      1: { duration: "20s each direction", cue: "Gently tilt head to one side. Opposite hand rests lightly on head - no cranking. Also chin to chest for upper trap. Keep shoulders completely relaxed. Never force." },
      2: { duration: "30s each direction", cue: "Add gentle slow circles exploring the full cervical range. Keep it flowing, never jerky. Find the stiffest angles and breathe into them." },
      3: { duration: "20s each direction active", cue: "No hand assistance. Hold the tilted position using only neck muscles on the opposite side. Active cervical lateral flexion hold." },
      4: { duration: "30s", cue: "Explore combined movements - tilt and slight rotation simultaneously. Find the angles that feel compressed and breathe through them." },
      5: { duration: "20s each direction", cue: "Maintenance. CS student priority - desk posture loads upper traps constantly. Never skip this." },
    }},
];

const TABS = [
  { id: "fb",  label: "Full Body",  color: "#22c55e" },
  { id: "p1",  label: "Tendon P1", color: "#ef4444" },
  { id: "p2",  label: "Tendon P2", color: "#f97316" },
  { id: "p3",  label: "Tendon P3", color: "#a78bfa" },
  { id: "str", label: "Stretch",   color: "#06b6d4" },
];

function WeightChip({ exKey, defaultWeight, color, weights, onSave }) {
  const [editing, setEditing] = useState(false);
  const inputRef = useRef(null);
  const stored = weights[exKey];
  const current = stored !== undefined ? stored : (defaultWeight || "");
  const [draft, setDraft] = useState(current);
  const startEdit = (e) => { e.stopPropagation(); setDraft(current); setEditing(true); setTimeout(() => { if (inputRef.current) { inputRef.current.focus(); inputRef.current.select(); } }, 30); };
  const commit = () => { onSave(exKey, draft.trim()); setEditing(false); };
  if (editing) return <input ref={inputRef} value={draft} onChange={e => setDraft(e.target.value)} onBlur={commit} onKeyDown={e => { if (e.key === "Enter") commit(); if (e.key === "Escape") setEditing(false); }} placeholder="e.g. 30kg" style={{ background: "#1e1e1e", border: `1.5px solid ${color}`, borderRadius: "7px", color: "#fff", fontSize: "12px", fontWeight: "600", padding: "4px 9px", outline: "none", width: "120px" }} />;
  return <div onClick={startEdit} style={{ display: "inline-flex", alignItems: "center", gap: "5px", fontSize: "12px", fontWeight: "600", color: current ? color : "#3a3a3a", background: "#161616", border: `1px solid ${current ? color + "35" : "#222"}`, padding: "4px 9px", borderRadius: "7px", cursor: "pointer", userSelect: "none" }}>{current ? <><span>{current}</span><span style={{ fontSize: "9px", color: "#555" }}>✏</span></> : <span>+ weight</span>}</div>;
}

function ExerciseCard({ ex, idx, color, weights, onSave }) {
  const [open, setOpen] = useState(false);
  const [done, setDone] = useState(false);
  const repsLine = ex.hold ? `${ex.sets}x${ex.reps} - ${ex.hold}` : `${ex.sets}x${ex.reps}`;
  return (
    <div style={{ background: ex.hero ? color + "0f" : "#111", border: `1px solid ${ex.hero ? color + "45" : "#1d1d1d"}`, borderRadius: "13px", marginBottom: "7px", overflow: "hidden", opacity: done ? 0.35 : 1, transition: "opacity 0.18s" }}>
      <div style={{ display: "flex", alignItems: "center", gap: "10px", padding: "13px 13px 0" }}>
        <div onClick={() => setDone(d => !d)} style={{ width: "28px", height: "28px", borderRadius: "50%", flexShrink: 0, border: done ? "none" : `1.5px solid ${color}50`, background: done ? color : "transparent", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: done ? "13px" : "11px", fontWeight: "800", color: done ? "#000" : color }}>{done ? "v" : idx + 1}</div>
        <div style={{ flex: 1, minWidth: 0 }} onClick={() => setOpen(o => !o)}>
          <div style={{ fontSize: "14px", fontWeight: "600", color: ex.hero ? color : "#efefef", lineHeight: "1.3", display: "flex", alignItems: "center", flexWrap: "wrap", gap: "6px" }}>{ex.name}{ex.hero && <span style={{ fontSize: "9px", background: color, color: "#000", padding: "2px 6px", borderRadius: "4px", fontWeight: "800" }}>HERO</span>}</div>
          <div style={{ fontSize: "11px", color: "#404040", marginTop: "2px" }}>{ex.equip}</div>
        </div>
        <div style={{ textAlign: "right", flexShrink: 0 }} onClick={() => setOpen(o => !o)}>
          <div style={{ fontSize: "12px", fontWeight: "700", color: "#ddd" }}>{repsLine}</div>
          {ex.tempo && <div style={{ fontSize: "10px", color: "#555", marginTop: "2px" }}>{ex.tempo}</div>}
        </div>
      </div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 13px 11px", gap: "8px" }}>
        <WeightChip exKey={ex.name} defaultWeight={ex.defaultWeight} color={color} weights={weights} onSave={onSave} />
        <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
          <span style={{ fontSize: "11px", color: "#555", background: "#1a1a1a", padding: "3px 8px", borderRadius: "6px" }}>rest {ex.rest}</span>
          <span onClick={() => setOpen(o => !o)} style={{ fontSize: "11px", color: "#333", cursor: "pointer", padding: "4px" }}>{open ? "^ hide" : "v cue"}</span>
        </div>
      </div>
      {open && <div style={{ padding: "11px 13px 14px", borderTop: "1px solid #1a1a1a", background: "#0c0c0c", fontSize: "13px", color: "#bbb", lineHeight: "1.65" }}>{ex.cue}</div>}
    </div>
  );
}

function StretchCard({ stretch, idx, phase }) {
  const [open, setOpen] = useState(false);
  const [done, setDone] = useState(false);
  const color = STRETCH_PHASES[phase].color;
  const phaseData = stretch.phases[phase];
  return (
    <div style={{ background: "#111", border: `1px solid ${stretch.priority ? color + "40" : "#1d1d1d"}`, borderRadius: "13px", marginBottom: "7px", overflow: "hidden", opacity: done ? 0.35 : 1, transition: "opacity 0.18s" }}>
      <div style={{ display: "flex", alignItems: "center", gap: "10px", padding: "13px 13px 8px" }}>
        <div onClick={() => setDone(d => !d)} style={{ width: "28px", height: "28px", borderRadius: "50%", flexShrink: 0, border: done ? "none" : `1.5px solid ${color}50`, background: done ? color : "transparent", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: done ? "13px" : "11px", fontWeight: "800", color: done ? "#000" : color }}>{done ? "v" : idx + 1}</div>
        <div style={{ flex: 1, minWidth: 0 }} onClick={() => setOpen(o => !o)}>
          <div style={{ fontSize: "14px", fontWeight: "600", color: "#efefef", lineHeight: "1.3", display: "flex", alignItems: "center", gap: "6px", flexWrap: "wrap" }}>{stretch.name}{stretch.priority && <span style={{ fontSize: "9px", background: color, color: "#000", padding: "2px 6px", borderRadius: "4px", fontWeight: "800" }}>PRIORITY</span>}</div>
          <div style={{ fontSize: "11px", color: "#404040", marginTop: "2px" }}>{stretch.target}</div>
        </div>
        <div style={{ textAlign: "right", flexShrink: 0 }} onClick={() => setOpen(o => !o)}>
          <div style={{ fontSize: "11px", fontWeight: "700", color }}>{phaseData.duration}</div>
          <div style={{ fontSize: "10px", color: "#555", marginTop: "2px" }}>{stretch.type}</div>
        </div>
      </div>
      <div style={{ display: "flex", justifyContent: "flex-end", padding: "0 13px 11px" }}>
        <span onClick={() => setOpen(o => !o)} style={{ fontSize: "11px", color: "#333", cursor: "pointer", padding: "4px" }}>{open ? "^ hide" : "v cue"}</span>
      </div>
      {open && <div style={{ padding: "11px 13px 14px", borderTop: "1px solid #1a1a1a", background: "#0c0c0c", fontSize: "13px", color: "#bbb", lineHeight: "1.65" }}>{phaseData.cue}</div>}
    </div>
  );
}

function FBView({ weights, onSave }) {
  const color = "#22c55e";
  let idx = 0;
  return (
    <div>
      <div style={{ padding: "12px 16px 6px" }}><div style={{ fontSize: "12px", color: "#555" }}>0-2 RIR - 28 sets - approx 75 min - tap weight chip to edit</div></div>
      <div style={{ padding: "0 12px 80px" }}>
        {FB.map(sec => (
          <div key={sec.section}>
            <div style={{ fontSize: "10px", fontWeight: "800", color: "#3a3a3a", letterSpacing: "0.12em", padding: "10px 2px 6px" }}>{sec.section}</div>
            {sec.exercises.map(ex => <ExerciseCard key={ex.name} ex={ex} idx={idx++} color={color} weights={weights} onSave={onSave} />)}
          </div>
        ))}
      </div>
    </div>
  );
}

function TendonView({ data, color, weights, onSave }) {
  let idx = 0;
  return (
    <div>
      <div style={{ padding: "12px 16px 8px" }}>
        <div style={{ background: "#111", border: "1px solid #1e1e1e", borderRadius: "10px", padding: "10px 12px" }}>
          <div style={{ fontSize: "12px", color, fontWeight: "700", marginBottom: "3px" }}>Protocol note</div>
          <div style={{ fontSize: "12px", color: "#888", lineHeight: "1.5" }}>{data.meta}</div>
        </div>
      </div>
      <div style={{ padding: "0 12px 80px" }}>
        {data.sessions.map(session => (
          <div key={session.label}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", padding: "12px 2px 6px" }}>
              <div style={{ fontSize: "11px", fontWeight: "800", color: color + "cc", letterSpacing: "0.1em" }}>{session.label}</div>
              <div style={{ fontSize: "11px", color: "#444" }}>{session.day}</div>
            </div>
            {session.exercises.map(ex => <ExerciseCard key={ex.name + session.label} ex={ex} idx={idx++} color={color} weights={weights} onSave={onSave} />)}
          </div>
        ))}
      </div>
    </div>
  );
}

function StretchView() {
  const [phase, setPhase] = useState(1);
  const phaseInfo = STRETCH_PHASES[phase];
  const color = phaseInfo.color;
  return (
    <div>
      <div style={{ padding: "12px 12px 8px" }}>
        <div style={{ display: "flex", gap: "5px", marginBottom: "10px" }}>
          {[1,2,3,4,5].map(p => (
            <button key={p} onClick={() => setPhase(p)} style={{ flex: 1, padding: "7px 2px", borderRadius: "9px", border: phase === p ? `1.5px solid ${STRETCH_PHASES[p].color}` : "1.5px solid #1e1e1e", background: phase === p ? STRETCH_PHASES[p].color + "18" : "transparent", color: phase === p ? STRETCH_PHASES[p].color : "#444", fontSize: "11px", fontWeight: "800", cursor: "pointer", transition: "all 0.12s" }}>P{p}</button>
          ))}
        </div>
        <div style={{ background: "#111", border: "1px solid #1e1e1e", borderRadius: "10px", padding: "10px 12px", marginBottom: "8px" }}>
          <div style={{ fontSize: "12px", fontWeight: "700", color, marginBottom: "3px" }}>{phaseInfo.label} - {phaseInfo.name}</div>
          <div style={{ fontSize: "12px", color: "#888", lineHeight: "1.5" }}>{phaseInfo.meta}</div>
        </div>
        <div style={{ fontSize: "12px", color: "#555", paddingLeft: "2px" }}>13 stretches - 20 min - tap number to check off</div>
      </div>
      <div style={{ padding: "0 12px 80px" }}>
        {STRETCHES.map((s, i) => <StretchCard key={s.name} stretch={s} idx={i} phase={phase} />)}
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("fb");
  const [weights, setWeights] = useState({});
  useEffect(() => { try { const s = localStorage.getItem("workout-weights"); if (s) setWeights(JSON.parse(s)); } catch (_) {} }, []);
  const handleSave = (exKey, value) => { const updated = { ...weights, [exKey]: value }; setWeights(updated); try { localStorage.setItem("workout-weights", JSON.stringify(updated)); } catch (_) {} };
  const tendonData  = { p1: T1, p2: T2, p3: T3 };
  const tendonColor = { p1: "#ef4444", p2: "#f97316", p3: "#a78bfa" };
  const tabTitle = { fb: "Full Body", p1: "Tendon - Phase 1", p2: "Tendon - Phase 2", p3: "Tendon - Phase 3", str: "Stretching" };
  const tabSub   = { p1: "Weeks 1-4 - Isometric", p2: "Weeks 5-8 - Heavy Slow", p3: "Weeks 9-12 - Plyometric", str: "13 stretches - 5 phase year plan" };
  return (
    <div style={{ background: "#080808", minHeight: "100vh", color: "#fff", maxWidth: "430px", margin: "0 auto" }}>
      <div style={{ position: "sticky", top: 0, zIndex: 20, background: "#080808", borderBottom: "1px solid #1a1a1a", padding: "14px 12px 12px" }}>
        <div style={{ display: "flex", gap: "5px", marginBottom: "12px", overflowX: "auto" }}>
          {TABS.map(t => { const active = tab === t.id; return <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: "0 0 auto", padding: "7px 10px", borderRadius: "10px", border: active ? `1.5px solid ${t.color}` : "1.5px solid #1e1e1e", background: active ? t.color + "18" : "transparent", color: active ? t.color : "#444", fontSize: "11px", fontWeight: "800", cursor: "pointer", transition: "all 0.12s", whiteSpace: "nowrap" }}>{t.label}</button>; })}
        </div>
        <div style={{ paddingLeft: "2px" }}>
          <div style={{ fontSize: "19px", fontWeight: "700", lineHeight: "1.2" }}>{tabTitle[tab]}</div>
          {tabSub[tab] && <div style={{ fontSize: "12px", color: "#555", marginTop: "2px" }}>{tabSub[tab]}</div>}
        </div>
      </div>
      {tab === "fb"  && <FBView weights={weights} onSave={handleSave} />}
      {tab === "str" && <StretchView />}
      {["p1","p2","p3"].includes(tab) && <TendonView data={tendonData[tab]} color={tendonColor[tab]} weights={weights} onSave={handleSave} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
